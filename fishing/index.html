  ctx.strokeStyle = "#1a6dff";
  ctx.fillStyle = "#fff";
  ctx.strokeText("分數", scoreLabelX, scoreLabelY);
  ctx.fillText("分數", scoreLabelX, scoreLabelY);

  // 分數數字：白字＋綠色文字外框，粗體，不套方框
  const scoreText = String(score);
  ctx.font = "bold 30px Arial";
  const scoreNumX = scoreLabelX + 92;
  ctx.lineWidth = 5;
  ctx.strokeStyle = "#2ecc40";
  ctx.fillStyle = "#fff";
  ctx.strokeText(scoreText, scoreNumX, scoreLabelY);
  ctx.fillText(scoreText, scoreNumX, scoreLabelY);

  // 第二排：元氣量表（白字＋橘色文字外框，不是實心方框；紅橘黃漸層長條，方角不倒圓角）
  const gaugeLabelX = 20, gaugeLabelY = 88;
  ctx.font = "bold 26px Arial";
  ctx.lineWidth = 5;
  ctx.strokeStyle = "#ff8c1a";
  ctx.fillStyle = "#fff";
  ctx.strokeText("元氣", gaugeLabelX, gaugeLabelY);
  ctx.fillText("元氣", gaugeLabelX, gaugeLabelY);

  const barX = gaugeLabelX + 82, barY = 68, barH = 26;
  const barW = Math.max(40, canvas.width - barX - 20);
  // 底色（量表沒有量的部分，深紅棕色，貼近原版量表底色）
  ctx.fillStyle = '#7a2b12';
  ctx.fillRect(barX, barY, barW, barH);
  // 進度（紅-橙-黃漸層，跟隨 displayTimeLeft 補間動畫）
  let percent = Math.max(0, Math.min(1, displayTimeLeft / GAME_TIME));
  let fillW = Math.max(0, barW * percent);
  let grad = ctx.createLinearGradient(barX, barY, barX + barW, barY);
  grad.addColorStop(0, '#f00');
  grad.addColorStop(0.25, '#ff8000');
  grad.addColorStop(0.6, '#ffe600');
  grad.addColorStop(1, '#ffe600');
  ctx.fillStyle = grad;
  ctx.fillRect(barX, barY, fillW, barH);
  // 外框（改細一點，不要太粗）
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#000';
  ctx.strokeRect(barX, barY, barW, barH);
  // 目前數值疊在量表右側，方便玩家看到精確數字
  ctx.font = "bold 16px Arial";
  ctx.textAlign = 'right';
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.fillStyle = "#fff";
  const energyText = String(Math.ceil(timeLeft));
  ctx.strokeText(energyText, barX + barW - 10, barY + barH - 7);
  ctx.fillText(energyText, barX + barW - 10, barY + barH - 7);

  ctx.restore();
}

// 遊戲主迴圈
function gameLoop(currentTime) {
  try {
    // 時間控制：確保遊戲速度一致
    if (!lastTime) lastTime = currentTime;
    deltaTime = currentTime - lastTime;
    
    // 如果幀率太快，跳過這一幀
    if (deltaTime < frameTime) {
      animationId = requestAnimationFrame(gameLoop);
      return;
    }
    
    // 計算時間縮放因子
    const timeScale = deltaTime / frameTime;
    lastTime = currentTime;
    
    // 防呆：確保 fishes、trashes 一定是陣列
    if (!Array.isArray(fishes)) fishes = [];
    if (!Array.isArray(trashes)) trashes = [];
    
    if (!gameOver && !bowlSinking && !paramPanelOpen) {
      elapsedGameTime += deltaTime / 1000; // 累計這一局已經進行的時間
      const passiveDrain = Math.min(
        PASSIVE_DRAIN_MAX,
        PASSIVE_DRAIN_BASE + elapsedGameTime * PASSIVE_DRAIN_ACCEL_PER_SEC
      );
      timeLeft = Math.max(0, timeLeft - passiveDrain * (deltaTime / 1000));
    }

    // 注意：這裡不再呼叫 updateLinePhysics()。
    // 之前這裡跟 drawRod() 內部各呼叫一次，等於同一幀內用「移動前」跟「移動後」的
    // 座標各跑一次物理鬆弛，鉤子/釣線的擺動會被拉直、看不出明顯晃動效果。
    // 現在改成只在 drawRod()（所有位置都更新完之後）呼叫一次，讓晃動效果能確實呈現。
    wavePhase += 0.035 * timeScale; // 波浪推進（根據時間縮放）
    // --- 主角移動速度影響波浪 ---
    let prevX = waveDisturb.x;
    waveDisturb.x = bowlX + pot.w/2;
    waveDisturb.v = (waveDisturb.x - prevX);
    // 可加一點阻尼讓波動慢慢消失
    waveDisturb.v *= 0.92;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 畫背景圖（天空+海洋）
    if (bgImg.complete && bgImg.naturalWidth > 0) {
      ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
    } else {
      // 圖片尚未載入完成時的備用漸層
      let seaY = LINE_PARAMS.seaSurfaceY;
      let skyGradient = ctx.createLinearGradient(0, 0, 0, seaY);
      skyGradient.addColorStop(0, '#b3e0ff');
      skyGradient.addColorStop(0.3, '#e6f6ff');
      skyGradient.addColorStop(0.7, '#a4c8e1');
      skyGradient.addColorStop(1, '#7bbbe6');
      ctx.fillStyle = skyGradient;
      ctx.fillRect(0, 0, canvas.width, seaY);
      let seaGradient = ctx.createLinearGradient(0, seaY, 0, canvas.height);
      seaGradient.addColorStop(0, '#7bbbe6');
      seaGradient.addColorStop(0.15, '#3a8cc1');
      seaGradient.addColorStop(0.4, '#206090');
      seaGradient.addColorStop(0.7, '#133a5c');
      seaGradient.addColorStop(1, '#0a1a2f');
      ctx.fillStyle = seaGradient;
      ctx.fillRect(0, seaY, canvas.width, canvas.height - seaY);
    }

    // --- 畫波浪海平面 ---
    ctx.save();
    ctx.beginPath();
    for (let x = 0; x <= canvas.width; x += 4) {
      let y = getWaveY(x, wavePhase);
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineTo(canvas.width, 0);
    ctx.lineTo(0, 0);
    ctx.closePath();
    ctx.fillStyle = '#b3e0ff';
    ctx.globalAlpha = 0.18;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
    // --- 畫波浪線 ---
    ctx.save();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x <= canvas.width; x += 2) {
      let y = getWaveY(x, wavePhase);
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();

    // 控制主角與大魚左右移動
    if (keyState.left) {
      bigFish.x -= 6 * timeScale;
      playerDir = -1;
    }
    if (keyState.right) {
      bigFish.x += 6 * timeScale;
      playerDir = 1;
    }
    if (bigFish.x < bigFish.w/2) bigFish.x = bigFish.w/2;
    if (bigFish.x > canvas.width - bigFish.w/2) bigFish.x = canvas.width - bigFish.w/2;
    // 精靈（角色）的高度跟著海平面高度參數走，海平面調高/調低時，角色也會跟著往下/往上移動
    bigFish.y = LINE_PARAMS.seaSurfaceY + 20;
    // 釣魚線起點、鉤子都跟著 bigFish.x

    // 控制魚鉤上下移動（慣性/拉力）
    if (!fishing && !hookThrowing) {
      const HOOK_ACCEL = LINE_PARAMS.hookAccel; // 按下上下鍵時的加速度
      const HOOK_MAX_VEL = LINE_PARAMS.hookMaxVel; // 速度上限，避免無限加速造成飄浮感

      // 玩家一按上／下鍵操作鉤子，就取消「碰水後自動下沉」，改成完全由玩家控制
      if (keyState.up || keyState.down) {
        hookAutoSinking = false;
      }

      if (hookAutoSinking) {
        // 拉竿結束、鉤子碰到水面後，如果玩家還沒有操作，鉤子要靠慣性繼續往下沉，
        // 一路沉到海底（hookMaxY）才會解除這個狀態，之後才會自動慢慢浮回待機高度。
        hookVelY += LINE_PARAMS.hookAutoSinkGravity * timeScale;
        if (hookVelY > LINE_PARAMS.hookAutoSinkMaxVelY) hookVelY = LINE_PARAMS.hookAutoSinkMaxVelY;
        hookVelX *= Math.pow(LINE_PARAMS.hookAutoSinkVelXDamp, timeScale); // 只加強阻尼模擬水阻力，水平位移仍交給下方彈簧物理區塊統一處理，避免重複位移
        hookY += hookVelY * timeScale;
        if (hookY >= LINE_PARAMS.hookMaxY) {
          hookY = LINE_PARAMS.hookMaxY;
          hookVelY = 0;
          hookAutoSinking = false; // 碰底了，解除自動下沉，接下來恢復一般行為（會自動慢慢浮回 hookRestY）
        }
      } else if (keyState.up) {
        hookVelY -= HOOK_ACCEL * timeScale; // 向上拉
      } else if (keyState.down) {
        hookVelY += HOOK_ACCEL * timeScale; // 向下拉
      } else {
        // 沒有按上下時，回到中間的速度也拉快一些，減少「鬆手後還在飄」的感覺
        let diff = LINE_PARAMS.hookRestY - hookY;
        if (diff > 0) {
          hookVelY += diff * LINE_PARAMS.hookReturnUpRate * timeScale; // 上浮速度
        } else {
          hookVelY += diff * LINE_PARAMS.hookReturnDownRate * timeScale; // 下沉稍慢，但比原本更緊繃
        }
      }

      if (!hookAutoSinking) {
        // 阻尼：放手瞬間更快煞停，操作起來更「跟手」
        hookVelY *= Math.pow(LINE_PARAMS.hookVelDamp, timeScale);
        hookVelY = Math.max(-HOOK_MAX_VEL, Math.min(HOOK_MAX_VEL, hookVelY));
        hookY += hookVelY * timeScale;
      }
      if (hookY < LINE_PARAMS.hookMinY) {
        hookY = LINE_PARAMS.hookMinY;
        hookVelY = 0;
      }
      if (hookY > LINE_PARAMS.hookMaxY) {
        hookY = LINE_PARAMS.hookMaxY;
        hookVelY = 0;
      }
    }
    // --- 鉤子拉竿動畫：真正的物理（初始衝力 + 重力），取代原本固定速度的動畫內插 ---
    // 分成兩個階段：
    //   'loop'：拉竿當下給鉤子一股迴圈衝力，讓它沿著迴圈路徑往前往上衝；
    //           這股衝力會隨時間自然衰減（模擬重力/甩竿阻力），所以衝到接近頂端時會明顯變慢，
    //           呈現「衝到頂端再後甩」的手感，而不是等速播放的動畫。
    //   'fall'：迴圈甩完之後，不再是內插動畫，而是真正用重力加速度讓鉤子自由落下，
    //           一直到鉤子確實碰到水面（或沒入水面以下）才會結束這次拉竿；
    //           在這整個過程中 fishing / hookThrowing 都維持 true，
    //           所以無論是迴圈上衝階段還是掉落階段，重複按空白鍵都完全無效，
    //           一定要等鉤子真的碰到水面才能按空白鍵拉第二次竿。
    if (hookThrowing) {
      if (hookThrowPhase === 'loop') {
        // 修正：落點 X 不再只在甩竿開始那一刻凍結一次，而是每一幀都重新讀取角色目前的 x，
        // 這樣鉤子迴圈甩出去、準備落下的目標位置，會即時跟著角色的左右移動而改變，
        // 不會出現「角色明明移動了，鉤子卻還是往舊位置甩」的錯位感。
        // （hookThrowPlayerDir 仍維持凍結，只用來決定偏移量的方向，避免迴圈甩到一半突然變向）
        hookThrowEndX = bigFish.x - LINE_PARAMS.hookLandingBehindOffset * hookThrowPlayerDir;
        // 迴圈中心點：落在起點與終點連線的中點，並往上偏移 hookLoopHeight，
        // 讓整個迴圈鼓起在連線上方（對應參考圖：鉤子往上繞一圈再落到角色身邊）。
        // 迴圈本身的幾何形狀維持原本設計，改變的只有「沿著迴圈前進的速度」。
        const loopCenterX = (hookThrowStartX + hookThrowEndX) / 2;
        const loopCenterY = (hookThrowStartY + hookThrowEndY) / 2 - LINE_PARAMS.hookLoopHeight;

        // 整個橢圓迴圈要跟著「拉竿當下，精靈與魚鉤之間的傾斜角度」一起歪——這個角度已經在
        // startHookCast() 裡凍結成 hookThrowTiltAngle，衝破水面那一瞬間就是沿著這個方向衝出去，
        // 不是每一幀重新用「起點到終點」（終點是很遠的天空高度 hookThrowSkyY）算一次角度。
        // 如果重新用起點到終點算，垂直距離會遠大於水平落差，算出來的角度會被稀釋到接近 0，
        // 導致不管拉竿前魚鉤偏得多斜，整個迴圈看起來還是幾乎垂直。hookLoopTiltFactor 用來加強/減弱
        // 這個效果（1＝傾斜角度完全比照精靈與魚鉤的角度，>1＝更誇張，0＝關閉、迴圈永遠正對垂直方向）。
        const loopTiltAngle = hookThrowTiltAngle * LINE_PARAMS.hookLoopTiltFactor;
        const cosTilt = Math.cos(loopTiltAngle), sinTilt = Math.sin(loopTiltAngle);
        // 世界座標 -> 迴圈本地座標：把整個世界「轉回」讓迴圈主軸朝正上方的角度，
        // 這樣底下橢圓壓縮的算法完全不用變，繼續假設自己是「正對垂直方向」在算。
        function toLoopLocal(px, py) {
          const dx = px - loopCenterX, dy = py - loopCenterY;
          return { x: dx * cosTilt + dy * sinTilt, y: -dx * sinTilt + dy * cosTilt };
        }
        // 迴圈本地座標 -> 世界座標：算完路徑後，再把結果「轉回」疊上魚線的傾斜角度。
        // 因為起點/終點都是先轉進再轉出（互為反向旋轉），所以起點/終點在世界座標系的位置
        // 完全不受影響，只有中間鼓起繞圈的部分會跟著整體歪斜。
        function toLoopWorld(lx, ly) {
          return { x: loopCenterX + lx * cosTilt - ly * sinTilt, y: loopCenterY + lx * sinTilt + ly * cosTilt };
        }

        // 讓迴圈變橢圓的技巧：先把水平座標「壓縮」進一個圓形空間裡算角度／半徑（跟原本算法一樣是圓），
        // 最後畫出來的瞬間再把 X 座標「放大」回真實空間，整條路徑就會變成水平方向被壓扁的橢圓；
        // 因為起點/終點在壓縮再放大之後會精確還原成原始座標，所以起點和終點的位置完全不受影響，
        // 只有中間鼓起繞圈的部分會變窄。hookLoopXScale 越小，迴圈越扁越像橢圓；1 則維持原本正圓。
        const xScale = Math.max(0.05, LINE_PARAMS.hookLoopXScale);
        const startLocal = toLoopLocal(hookThrowStartX, hookThrowStartY);
        const endLocal = toLoopLocal(hookThrowEndX, hookThrowEndY);
        const startDX = startLocal.x / xScale, startDY = startLocal.y;
        const endDX = endLocal.x / xScale, endDY = endLocal.y;
        const startAngle = Math.atan2(startDY, startDX);
        const endAngle = Math.atan2(endDY, endDX);
        const startRadius = Math.hypot(startDX, startDY);
        const endRadius = Math.hypot(endDX, endDY);

        // hookLoopDirection：基準繞圈方向（1＝順時針、-1＝逆時針），再乘上拉竿當下凍結的角色面向
        // （hookThrowPlayerDir，而不是即時 playerDir），讓迴圈朝角色「甩竿那一刻」面向的那一側繞，
        // 之後就算角色在半空中甩竿時又按了左右鍵轉向，也不會讓迴圈中途變向、動力學被打亂。
        const dir = (LINE_PARAMS.hookLoopDirection >= 0 ? 1 : -1) * (hookThrowPlayerDir >= 0 ? 1 : -1);
        let angleDiff = endAngle - startAngle;
        while (dir > 0 && angleDiff < 0) angleDiff += Math.PI * 2;
        while (dir < 0 && angleDiff > 0) angleDiff -= Math.PI * 2;
        const totalAngle = angleDiff + dir * LINE_PARAMS.hookLoopTurns * Math.PI * 2;

        // 拉竿給的初始衝力（hookThrowAngVel）會隨時間自然衰減，模擬重力/甩竿阻力
        // 把力氣慢慢吃掉；但保留一個下限（hookCastMinAngVel），避免衰減到趨近 0
        // 導致迴圈卡在半路甩不完，這個下限剛好用來銜接「後甩」收尾的等速甩出動作。
        hookThrowAngVel *= Math.pow(LINE_PARAMS.hookCastAngDamp, timeScale);
        if (hookThrowAngVel < LINE_PARAMS.hookCastMinAngVel) hookThrowAngVel = LINE_PARAMS.hookCastMinAngVel;

        hookThrowT += hookThrowAngVel * timeScale;

        // --- 強制完成保險機制 ---
        // 用「真實經過的毫秒數」（deltaTime，不受 timeScale/幀率影響）累計這次迴圈甩竿已經跑了多久；
        // 不管角色跑到畫面的哪個位置、不管上面的物理參數怎麼調（甚至面板貼上奇怪的 JSON），
        // 只要超過 hookLoopForceCompleteMs 這個時間上限，就直接強制把 t 設成 1，
        // 保證每一次拉竿最終都會確實把整個迴圈甩完，絕不會卡在半路、力量不夠就直接掉下去。
        hookThrowLoopElapsedMs += deltaTime;
        if (hookThrowLoopElapsedMs >= LINE_PARAMS.hookLoopForceCompleteMs) {
          hookThrowT = 1;
        }

        if (hookThrowT > 1) hookThrowT = 1;
        const t = hookThrowT;

        const angle = startAngle + totalAngle * t;
        const radius = startRadius + (endRadius - startRadius) * t;

        // 先在「迴圈本地座標」（永遠正對垂直方向）算出橢圓上的點，最後才轉回世界座標、
        // 疊上魚線甩出的傾斜角度，讓整個迴圈跟著歪斜。
        const loopLocalX = Math.cos(angle) * radius * xScale;
        const loopLocalY = Math.sin(angle) * radius;
        const loopWorldPt = toLoopWorld(loopLocalX, loopLocalY);
        hookDrawX = loopWorldPt.x;
        hookY     = loopWorldPt.y;

        if (hookThrowT >= 1) {
          // 迴圈甩完，交給真正的重力自由落下階段——此時鉤子通常還在半空中（角色背後上方），
          // 還沒有碰到水面，所以維持 fishing/hookThrowing = true，空白鍵繼續無效。
          hookThrowPhase = 'fall';
          // 用迴圈甩到最後瞬間的速度（角速度 × 半徑變化）換算出真實的切線速度，
          // 讓自由落下的初始動量延續甩竿最後的力道，銜接得自然，不會憑空歸零卡一下。
          // 水平分量一樣要乘上 xScale 放大回真實空間，跟畫面座標算法保持一致；
          // 這股速度是「本地座標」算出來的方向量，最後也要用同一個傾斜角度轉回世界座標
          // （方向量只需要旋轉，不需要再加上 loopCenter 的位移）。
          const angVelNow = totalAngle * hookThrowAngVel;
          const radVelNow = (endRadius - startRadius) * hookThrowAngVel;
          const localVelX = (-Math.sin(angle) * angVelNow * radius + Math.cos(angle) * radVelNow) * xScale;
          const localVelY =  Math.cos(angle) * angVelNow * radius + Math.sin(angle) * radVelNow;
          hookFallVelX = localVelX * cosTilt - localVelY * sinTilt;
          hookFallVelY = localVelX * sinTilt + localVelY * cosTilt;
        }
      } else if (hookThrowPhase === 'fall') {
        // 'fall' 階段：鉤子還在空中，真正的重力物理，不再是內插動畫。
        hookFallVelY += LINE_PARAMS.hookFallGravity * timeScale;
        if (hookFallVelY > LINE_PARAMS.hookFallMaxVelY) hookFallVelY = LINE_PARAMS.hookFallMaxVelY;
        hookFallVelX *= Math.pow(LINE_PARAMS.hookFallVelXDamp, timeScale);
        // 修正：自由落下時也持續往「角色目前位置對應的落點」方向做一點點牽引，
        // 讓玩家在鉤子還沒落水前繼續左右移動時，最終落水點依然會跟著微調，
        // 而不是完全交給甩竿那一瞬間就已經固定死的動量決定。
        const fallTargetX = bigFish.x - LINE_PARAMS.hookLandingBehindOffset * hookThrowPlayerDir;
        hookFallVelX += (fallTargetX - hookDrawX) * LINE_PARAMS.hookXSpring * timeScale;
        hookDrawX += hookFallVelX * timeScale;
        hookY += hookFallVelY * timeScale;

        // 鉤子碰到水面，這次拉竿就算結束，玩家可以馬上再按一次空白鍵甩下一竿；
        // 但如果玩家沒有馬上再拉竿、也沒按上下鍵，鉤子要繼續靠慣性自動下沉到海底，
        // 碰底之後才會自動浮回待機高度（見下方 hookAutoSinking 的處理）。
        const waterYHere = getWaveY(hookDrawX, wavePhase);
        if (hookY >= waterYHere) {
          hookY = waterYHere;
          hookThrowing = false;
          fishing = false;
          hookThrowPhase = 'loop'; // 重置，準備下一次甩竿
          hookVelY = hookFallVelY; // 保留碰水當下的下沉動量，讓鉤子自然接著往下沉，而不是瞬間停住
          hookVelX = hookFallVelX * 0.3;
          hookAutoSinking = true; // 進入「自動下沉到海底」狀態，直到碰底或玩家操作為止
        }
      }
    } else {
      // 未在甩竿時，鉤子水平位置改用「彈簧＋慣性（質量）」的物理模擬：
      // 左右鍵只控制角色移動，鉤子本身不會直接被設定到角色下方，
      // 而是像被釣線拖著走的重物一樣，靠釣線的拉力（彈簧力）慢慢把它拖過去。
      // 因為鉤子有慣性，角色快速左右晃動時，方向不斷切換的拉力會互相抵銷，
      // 鉤子幾乎不太會晃動；只有角色朝同一個方向持續移動，鉤子才會被慢慢拖著走。
      const anchor = getLineStartPoint();
      const dx = anchor.x - hookDrawX;
      const springAccel = dx * LINE_PARAMS.hookXSpring; // 釣線拉力（位移越大，拉力越大）
      hookVelX += springAccel * timeScale;
      hookVelX *= Math.pow(LINE_PARAMS.hookXDamp, timeScale); // 阻尼，避免無止盡晃動
      hookDrawX += hookVelX * timeScale;
    }

    // --- 鍋子隨波浪浮動 ---
    // 鍋蓋正在蓋下來，或已經開始下沉時，鍋子都要停止移動
    if (!bowlSinking && !lidDropping) {
      let bowlTargetY = getWaveY(bowlX + pot.w/2, wavePhase) - pot.h/2 + LINE_PARAMS.bowlWaterOffsetY;
      let spring = 0.18, damp = 0.72;
      if (typeof bowlY !== 'number') bowlY = pot.y;
      // 新增：碗下沉彈跳
      bowlY_vel += (bowlTargetY - bowlY) * spring;
      bowlY_vel += bowlImpulseY;
      bowlImpulseY *= 0.85; // 衰減
      bowlY_vel *= damp;
      bowlY += bowlY_vel;
      // --- 新增：碗慢慢向右移動，到最右邊後再慢慢向左移動，來回反覆 ---
      if (typeof bowlX !== 'number') bowlX = pot.x;
      bowlX += bowlXDir * bowlXSpeed * timeScale;
      if (bowlX > bowlXMax) {
        bowlX = bowlXMax;
        bowlXDir = -1;
      } else if (bowlX < bowlXMin) {
        bowlX = bowlXMin;
        bowlXDir = 1;
      }
    }

    // --- 新增：鍋蓋往下蓋的動畫，蓋緊後才開始鍋子下沉 ---
    if (lidDropping) {
      lidDropOffset += LID_DROP_SPEED * timeScale;
      if (lidDropOffset >= 0) {
        lidDropOffset = 0;
        lidDropping = false;
        // 鍋蓋蓋緊了，換成鍋子整個往下沉的動畫（從目前所在高度開始沉，而不是跳回原位）
        bowlSinking = true;
        bowlSinkTargetY = null;
        if (typeof bowlY !== 'number') bowlY = pot.y;
      }
    }

    // 畫主角和釣竿
    drawPlayer();
    drawRod();

    // 畫魚
    for (let fish of fishes) {
      if (!fish.caught) {
        fish.x += fish.speed * fish.dir * timeScale;
        // 新增：讓魚一邊游一邊隨機上下浮動（被釣起／正在下沉回海裡的魚不套用，
        // 不然這裡改掉的 y 會蓋掉「跟著釣線／鉤子移動」或「下沉動畫」用的座標，導致魚吊不起來）
        if (!fish.lifting && !fish.falling) {
          fish.bobTime = (fish.bobTime || 0) + deltaTime / 1000;
          fish.y = fish.baseY + Math.sin(fish.bobTime * fish.bobSpeed + fish.bobPhase) * fish.bobAmplitude;
        }
        // 如果游出畫面：
        // - 一般魚：直接原地重生成一條新魚（維持畫面上魚的總數固定）
        // - 小黃魚群的魚：游出畫面就直接消失、不再補新的，
        //   這樣一群魚游完之後就會恢復成只有一般魚，並乾淨地等待下一次 35 秒倒數
        if ((fish.dir === 1 && fish.x > canvas.width + SPAWN_MARGIN) || (fish.dir === -1 && fish.x < -SPAWN_MARGIN)) {
          if (fish.fishTier === 'school') {
            fish.removeMe = true;
            continue; // 不畫也不補新魚，直接跳過
          }
          Object.assign(fish, createFish());
        }
      } else if (fish.fadeOut) {
        // 已經被釣中、正在淡出：跟著碗一起移動，不要卡死在畫面固定座標上
        fish.x = bowlX + (fish.caughtOffsetX || 0);
        fish.y = bowlY + (fish.caughtOffsetY || 0);
      }
      drawFish(fish);
    }
    // 把游出畫面的小黃魚群成員從陣列中移除，避免牠們一直留在 fishes 裡佔用數量
    if (fishes.some(f => f.removeMe)) {
      fishes = fishes.filter(f => !f.removeMe);
    }

    // 畫垃圾
    for (let trash of trashes) {
      if (!trash.lifting && !trash.hit) {
        trash.x += trash.speed * trash.dir * timeScale;
        // 新增：讓垃圾一邊漂一邊隨機上下浮動（正在被釣起或掉回海裡的垃圾不套用，
        // 避免蓋掉「跟著釣線／鉤子移動」或「掉回海裡」動畫用的座標）
        if (!trash.falling) {
          trash.bobTime = (trash.bobTime || 0) + deltaTime / 1000;
          trash.y = trash.baseY + Math.sin(trash.bobTime * trash.bobSpeed + trash.bobPhase) * trash.bobAmplitude;
        }
        if ((trash.dir === 1 && trash.x > canvas.width + SPAWN_MARGIN) || (trash.dir === -1 && trash.x < -SPAWN_MARGIN)) {
          // 重新生成
          Object.assign(trash, createTrash());
        }
      } else if (trash.hit && trash.fadeOut) {
        // 已經釣中、正在淡出：跟著碗一起移動，不要卡死在畫面固定座標上
        trash.x = bowlX + (trash.caughtOffsetX || 0);
        trash.y = bowlY + (trash.caughtOffsetY || 0);
      }
      drawTrash(trash);
      // 淡出動畫播完才真正重置產生新的垃圾，讓玩家先看清楚淡出過程
      if (trash.hit && trash.fadeOut && trash.alpha <= 0) {
        Object.assign(trash, createTrash());
      }
    }

    // 垃圾被釣起來動畫：全程緊貼釣線／鉤子，沒有自己獨立的物理運動
    for (let trash of trashes) {
      if (trash.lifting && !trash.hit) {
        let isHookCatch = (typeof trash.hookLineIndex !== 'number') || trash.hookLineIndex >= LINE_POINTS - 1;
        // 每一幀都直接把垃圾的位置設成鉤子或釣線上那一點的當下位置
        if (isHookCatch) {
          trash.x = hookDrawX;
          trash.y = hookY;
        } else {
          let idx = trash.hookLineIndex;
          let tt = typeof trash.hookLineT === 'number' ? trash.hookLineT : 0;
          let p1 = linePoints[idx];
          let p2 = linePoints[idx + 1] || p1;
          trash.x = p1.x + (p2.x - p1.x) * tt;
          trash.y = p1.y + (p2.y - p1.y) * tt;
        }

        let waterY = getWaveY(trash.x, wavePhase);
        let aboveWater = trash.y <= waterY;
        // 記錄前一幀的 Y 座標，用來判斷這一幀是「往下」還是「往上」經過碗
        let prevLiftY = (typeof trash.prevLiftY === 'number') ? trash.prevLiftY : trash.y;
        // 只有從碗的上方往下經過才算數；從下面往上經過碗不算
        let movingDownIntoPot = trash.y > prevLiftY + 0.01;

        if (aboveWater) {
          trash.everAboveWater = true;
          let inPot = isEnteringPotFromAbove(trash.x, trash.y, prevLiftY, bowlX, bowlY, pot.w, pot.h);
          if (inPot) {
            // 只有真的掉進碗裡才會扣元氣
            trash.hit = true;
            // 新增：進入漸層消失動畫（不要立刻消失，讓玩家先看清楚真的釣到了）
            trash.fadeOut = true;
            trash.alpha = 1;
            trash.fadeElapsed = 0;
            // 新增：記錄相對於碗的偏移量，讓垃圾在淡出期間跟著碗一起移動
            trash.caughtOffsetX = trash.x - bowlX;
            trash.caughtOffsetY = trash.y - bowlY;
            // 新增：垃圾進入碗 fadeOut 時播放扣元氣音效（延遲 1 秒）
            penaltySound.currentTime = 0;
            setTimeout(() => penaltySound.play(), 1000); // 延遲1秒播放
            if (timeLeft > 0 && !gameOver) {
              timeLeft = Math.max(0, timeLeft - TRASH_PENALTY);
            }
            trash.lifting = false;
            trash.everAboveWater = false;
          }
          // 還沒對到碗：繼續黏著鉤子/線等待玩家移動貓咪對準
        } else {
          if (trash.everAboveWater) {
            // 曾經被拉出水面過，但沒對準碗、鉤子又沉回海裡：脫鉤沉回海底，之後繼續正常漂浮
            trash.falling = true;
            trash.fallT = 0;
            trash.fallStartY = trash.y;
            trash.fallEndY = 530 + Math.random() * 40;
            trash.lifting = false;
            trash.everAboveWater = false;
          } else if (!fishing && !hookThrowing) {
            // 修正：把 baseY 同步成目前實際位置，避免下一幀用舊的 baseY 計算位置，
            // 造成垃圾瞬間「消失、瞬移回海裡」的跳動感
            trash.baseY = trash.y;
            trash.lifting = false;
            trash.hookLineIndex = null;
            trash.hookLineT = 0;
          }
        }
        // 記錄這一幀的 Y 座標，供下一幀判斷方向使用
        trash.prevLiftY = trash.y;
      }
      // 沒接住的垃圾：沉回海底後繼續往前漂（下沉速度跟漂動速度差不多）
      if (trash.falling) {
        let fallSpeed = trash.speed * 0.8;
        if (trash.y < trash.fallEndY) {
          trash.y += fallSpeed * timeScale;
          if (trash.y > trash.fallEndY) trash.y = trash.fallEndY;
        } else {
          trash.y -= fallSpeed * timeScale;
          if (trash.y < trash.fallEndY) trash.y = trash.fallEndY;
        }
        if (Math.abs(trash.y - trash.fallEndY) < 1) {
          trash.y = trash.fallEndY;
          // 修正：下沉動畫結束時同步 baseY，避免恢復自由漂動那一幀又跳回舊的 baseY
          trash.baseY = trash.y;
          trash.falling = false;
        }
      }
    }

    // 畫特殊海洋生物（魷魚/章魚）
    if (specialSeaCreature) {
      if (!specialSeaCreature.caught && !specialSeaCreature.lifting) {
        specialSeaCreature.x += specialSeaCreature.speed * specialSeaCreature.dir * timeScale;
        if ((specialSeaCreature.dir === 1 && specialSeaCreature.x > canvas.width + SPAWN_MARGIN) || (specialSeaCreature.dir === -1 && specialSeaCreature.x < -SPAWN_MARGIN)) {
          specialSeaCreature = null; // 游出畫面消失
        }
      } else if (specialSeaCreature.caught && specialSeaCreature.fadeOut) {
        // 已經釣中、正在淡出：跟著碗一起移動，不要卡死在畫面固定座標上
        specialSeaCreature.x = bowlX + (specialSeaCreature.caughtOffsetX || 0);
        specialSeaCreature.y = bowlY + (specialSeaCreature.caughtOffsetY || 0);
      }
      // 即使已經 caught，也要繼續畫，直到淡出動畫播完為止，跟黃魚一致
      if (specialSeaCreature) {
        drawSpecialSeaCreature(specialSeaCreature);
      }
    }
    // 特殊生物被釣上來動畫：全程緊貼釣線／鉤子，沒有自己獨立的物理運動
    if (specialSeaCreature && specialSeaCreature.lifting && !specialSeaCreature.caught) {
      let isHookCatch = (typeof specialSeaCreature.hookLineIndex !== 'number') || specialSeaCreature.hookLineIndex >= LINE_POINTS - 1;
      if (isHookCatch) {
        specialSeaCreature.x = hookDrawX;
        specialSeaCreature.y = hookY;
      } else {
        let idx = specialSeaCreature.hookLineIndex;
        let tt = typeof specialSeaCreature.hookLineT === 'number' ? specialSeaCreature.hookLineT : 0;
        let p1 = linePoints[idx];
        let p2 = linePoints[idx + 1] || p1;
        specialSeaCreature.x = p1.x + (p2.x - p1.x) * tt;
        specialSeaCreature.y = p1.y + (p2.y - p1.y) * tt;
      }

      let waterY = getWaveY(specialSeaCreature.x, wavePhase);
      let aboveWater = specialSeaCreature.y <= waterY;
      // 記錄前一幀的 Y 座標，用來判斷這一幀是「往下」還是「往上」經過碗
      let prevLiftY = (typeof specialSeaCreature.prevLiftY === 'number') ? specialSeaCreature.prevLiftY : specialSeaCreature.y;
      // 只有從碗的上方往下經過才算數；從下面往上經過碗不算
      let movingDownIntoPot = specialSeaCreature.y > prevLiftY + 0.01;

      if (aboveWater) {
        specialSeaCreature.everAboveWater = true;
        let inPot = isEnteringPotFromAbove(specialSeaCreature.x, specialSeaCreature.y, prevLiftY, bowlX, bowlY, pot.w, pot.h);
        if (inPot && timeLeft > 0 && !gameOver) {
          specialSeaCreature.caught = true;
          // 新增：記錄相對於碗的偏移量，讓特殊生物在淡出期間跟著碗一起移動
          specialSeaCreature.caughtOffsetX = specialSeaCreature.x - bowlX;
          specialSeaCreature.caughtOffsetY = specialSeaCreature.y - bowlY;
          // 分數比例：魷魚／章魚 400、黃魚 200、小黃魚 100、海參 20（元氣依同比例縮放）
          if (specialSeaCreature.type === 'squid') {
            score += BIG_FISH_SCORE;
            timeLeft = Math.min(GAME_TIME, timeLeft + BIG_FISH_ENERGY);
          } else if (specialSeaCreature.type === 'octopus') {
            score += BIG_FISH_SCORE;
            timeLeft = Math.min(GAME_TIME, timeLeft + BIG_FISH_ENERGY);
          } else if (specialSeaCreature.type === 'seacucumber') {
            score += SEA_CUCUMBER_SCORE;
            timeLeft = Math.min(GAME_TIME, timeLeft + SEA_CUCUMBER_ENERGY);
          }
          // 進入漸層消失動畫
          specialSeaCreature.fadeOut = true;
          specialSeaCreature.alpha = 1;
          specialSeaCreature.fadeElapsed = 0;
          // 新增：只有特殊生物進入fadeOut時才播放食物音效
          if (specialSeaCreature.type === 'squid' || specialSeaCreature.type === 'octopus' || specialSeaCreature.type === 'seacucumber') {
            playRandomFoodSound();
          }
          // 下一隻特殊生物計時
          scheduleSpecialSeaCreature();
          // 消失（等淡出動畫完全播完再清除，時長跟其他物品一致）
          setTimeout(() => { specialSeaCreature = null; }, CATCH_FADE_HOLD_MS + CATCH_FADE_DURATION_MS);
          specialSeaCreature.lifting = false;
          specialSeaCreature.everAboveWater = false;
        }
        // 還沒對到碗：繼續黏著鉤子/線等待玩家移動貓咪對準
      } else {
        if (specialSeaCreature.everAboveWater) {
          // 曾經被拉出水面過，但沒對準碗、鉤子又沉回海裡：脫鉤沉回海底，之後繼續正常游動
          specialSeaCreature.falling = true;
          specialSeaCreature.fallT = 0;
          specialSeaCreature.fallStartY = specialSeaCreature.y;
          specialSeaCreature.fallEndY = 530 + Math.random() * 40;
          specialSeaCreature.lifting = false;
          specialSeaCreature.everAboveWater = false;
        } else if (!fishing && !hookThrowing) {
          specialSeaCreature.lifting = false;
          specialSeaCreature.hookLineIndex = null;
          specialSeaCreature.hookLineT = 0;
        }
      }
      // 記錄這一幀的 Y 座標，供下一幀判斷方向使用
      specialSeaCreature.prevLiftY = specialSeaCreature.y;
    }
    // 沒接住的特殊生物：沉回海底後繼續往前游（下沉速度跟游動速度差不多）
    if (specialSeaCreature && specialSeaCreature.falling) {
      let fallSpeed = specialSeaCreature.speed * 0.8;
      if (specialSeaCreature.y < specialSeaCreature.fallEndY) {
        specialSeaCreature.y += fallSpeed * timeScale;
        if (specialSeaCreature.y > specialSeaCreature.fallEndY) specialSeaCreature.y = specialSeaCreature.fallEndY;
      } else {
        specialSeaCreature.y -= fallSpeed * timeScale;
        if (specialSeaCreature.y < specialSeaCreature.fallEndY) specialSeaCreature.y = specialSeaCreature.fallEndY;
      }
      if (Math.abs(specialSeaCreature.y - specialSeaCreature.fallEndY) < 1) {
        specialSeaCreature.y = specialSeaCreature.fallEndY;
        specialSeaCreature.falling = false;
      }
    }

    // 分數與元氣 HUD（樣式參考原版：分數在上、元氣量表在下）
    // 補間動畫：讓 displayTimeLeft 慢慢趨近 timeLeft
    const lerpSpeed = 0.18; // 越大越快
    displayTimeLeft += (timeLeft - displayTimeLeft) * lerpSpeed;
    if (Math.abs(displayTimeLeft - timeLeft) < 0.1) displayTimeLeft = timeLeft;
    drawScoreAndEnergyHUD();

    // 魚被釣上來動畫：全程緊貼釣線／鉤子，沒有自己獨立的物理運動
    for (let fish of fishes) {
      if (fish.lifting && !fish.caught) {
        // 記錄前一幀的 Y 座標，用來判斷魚這一幀是「往下」還是「往上」經過碗
        let prevLiftY = (typeof fish.prevLiftY === 'number') ? fish.prevLiftY : fish.y;
        let isHookCatch = (typeof fish.hookLineIndex !== 'number') || fish.hookLineIndex >= LINE_POINTS - 1;
        // 每一幀都直接把魚的位置設成鉤子或釣線上那一點的當下位置，
        // 魚完全黏著線／鉤子移動，不會有自己另外的運動軌跡
        if (isHookCatch) {
          fish.x = hookDrawX;
          fish.y = hookY;
        } else {
          let idx = fish.hookLineIndex;
          let tt = typeof fish.hookLineT === 'number' ? fish.hookLineT : 0;
          let p1 = linePoints[idx];
          let p2 = linePoints[idx + 1] || p1;
          fish.x = p1.x + (p2.x - p1.x) * tt;
          fish.y = p1.y + (p2.y - p1.y) * tt;
        }

        let waterY = getWaveY(fish.x, wavePhase);
        let aboveWater = fish.y <= waterY;
        // 只有從碗的上方往下經過才算數；從下面往上經過碗不算
        let movingDownIntoPot = fish.y > prevLiftY + 0.01;

        if (aboveWater) {
          fish.everAboveWater = true;
          // 已經被拉出水面：貓咪左右移動時，魚會跟著鉤子/線一起移動，
          // 只要目前位置剛好對到碗、且是從上往下經過，就算釣到
          let inPot = isEnteringPotFromAbove(fish.x, fish.y, prevLiftY, bowlX, bowlY, pot.w, pot.h);
          if (inPot && timeLeft > 0 && !gameOver) {
            fish.caught = true;
            // 新增：記錄相對於碗的偏移量，讓魚在淡出期間跟著碗一起移動，
            // 不然碗會左右漂移、上下彈跳，魚卻卡在原地不動，看起來就像從碗裡跑出去
            fish.caughtOffsetX = fish.x - bowlX;
            fish.caughtOffsetY = fish.y - bowlY;
            // 新增：碗下沉衝擊
            bowlImpulseY = 8; // 下沉
            // 參考原版：魚類是小幅度累積分數，壞魚只會消耗元氣
            if (fish.color === "gold") {
              score += fish.rewardScore;
              timeLeft = Math.min(GAME_TIME, timeLeft + fish.rewardEnergy);
            } else if (fish.color === "#fcf") {
              timeLeft = Math.max(0, timeLeft + fish.rewardEnergy);
            }
            // 立刻生成新魚（小黃魚群的魚被釣到後不補新魚，牠們只在魚群批次裡出現，
            // 釣完/游完就消失，等下一次 35 秒倒數才會有下一批）
            if (fish.fishTier !== 'school') {
              fishes.push(createFish());
            }
            // 新增：進入漸層消失動畫
            fish.fadeOut = true;
            fish.alpha = 1;
            fish.fadeElapsed = 0;
            // 新增：壞魚進入 fadeOut 時播放扣元氣音效（延遲 1 秒）
            if (fish.color === "#fcf") {
              penaltySound.currentTime = 0;
              setTimeout(() => penaltySound.play(), 1000); // 延遲1秒播放
            }
            // 黃色魚進入fadeOut時才播放食物音效
            if (fish.color === "gold") {
              playRandomFoodSound();
            }
            fish.lifting = false;
            fish.everAboveWater = false;
          } else if (inPot) {
            // 對到碗了，但當下時間已到／遊戲已結束：視為沒接住，沉回海裡
            fish.falling = true;
            fish.fallT = 0;
            fish.fallStartY = fish.y;
            fish.fallEndY = 530 + Math.random() * 40;
            fish.lifting = false;
            fish.everAboveWater = false;
          }
          // 還沒對到碗：繼續黏著鉤子/線等待玩家移動貓咪對準
        } else {
          // 目前沒有露出水面
          if (fish.everAboveWater) {
            // 曾經被拉出水面過，但沒對準碗、鉤子又沉回海裡：脫鉤沉回海底，之後繼續正常游動
            fish.falling = true;
            fish.fallT = 0;
            fish.fallStartY = fish.y;
            fish.fallEndY = 530 + Math.random() * 40;
            fish.lifting = false;
            fish.everAboveWater = false;
          } else if (!fishing && !hookThrowing) {
            // 從沒被拉出水面過，玩家已經放開釣竿：脫離釣線，恢復自由游動
            // 修正：把 baseY 同步成目前實際位置，避免下一幀用舊的 baseY 計算位置，
            // 造成魚瞬間「消失、瞬移回海裡」的跳動感
            fish.baseY = fish.y;
            fish.lifting = false;
            fish.hookLineIndex = null;
            fish.hookLineT = 0;
          }
        }
        // 記錄這一幀的 Y 座標，供下一幀判斷方向使用
        fish.prevLiftY = fish.y;
      }
      // 沒接住的魚：沉回海底後繼續往前游（下沉速度跟游動速度差不多）
      if (fish.falling) {
        let fallSpeed = fish.speed * 0.8; // 跟游動速度相近，不要太快
        if (fish.y < fish.fallEndY) {
          fish.y += fallSpeed * timeScale;
          if (fish.y > fish.fallEndY) fish.y = fish.fallEndY;
        } else {
          fish.y -= fallSpeed * timeScale;
          if (fish.y < fish.fallEndY) fish.y = fish.fallEndY;
        }
        if (Math.abs(fish.y - fish.fallEndY) < 1) {
          fish.y = fish.fallEndY;
          // 修正：下沉動畫結束時同步 baseY，避免恢復自由游動那一幀又跳回舊的 baseY
          fish.baseY = fish.y;
          fish.falling = false;
        }
      }
    }

    // 鉤子動畫：拋竿動畫結束後，若還沒沉回目標高度，慢慢回到目前的目標高度
    // （拉竿甩竿過程中的速度改由 hookCastImpulse / hookCastAngDamp / hookFallGravity 等物理參數控制，詳見上方 hookThrowing 區塊）
    if (hookY < hookTargetY && !hookThrowing) {
      hookY += LINE_PARAMS.hookSettleDownSpeed * timeScale;
      if (hookY > hookTargetY) hookY = hookTargetY;
    }

    // --- 新增：碗沉到底動畫 ---
    if (bowlSinking) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // 畫背景圖（天空+海洋）
      if (bgImg.complete && bgImg.naturalWidth > 0) {
        ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
      } else {
        let seaY = LINE_PARAMS.seaSurfaceY;
        let skyGradient = ctx.createLinearGradient(0, 0, 0, seaY);
        skyGradient.addColorStop(0, '#b3e0ff');
        skyGradient.addColorStop(0.3, '#e6f6ff');
        skyGradient.addColorStop(0.7, '#a4c8e1');
        skyGradient.addColorStop(1, '#7bbbe6');
        ctx.fillStyle = skyGradient;
        ctx.fillRect(0, 0, canvas.width, seaY);
        let seaGradient = ctx.createLinearGradient(0, seaY, 0, canvas.height);
        seaGradient.addColorStop(0, '#7bbbe6');
        seaGradient.addColorStop(0.15, '#3a8cc1');
        seaGradient.addColorStop(0.4, '#206090');
        seaGradient.addColorStop(0.7, '#133a5c');
        seaGradient.addColorStop(1, '#0a1a2f');
        ctx.fillStyle = seaGradient;
        ctx.fillRect(0, seaY, canvas.width, canvas.height - seaY);
      }
      // 畫海平面線
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, LINE_PARAMS.seaSurfaceY);
      ctx.lineTo(canvas.width, LINE_PARAMS.seaSurfaceY);
      ctx.stroke();
      // --- 鍋子下沉動畫 ---
      if (bowlSinkTargetY === null) {
        bowlSinkTargetY = canvas.height - pot.h - 20;
      }
      if (bowlY < bowlSinkTargetY) {
        bowlY += bowlSinkSpeed * timeScale;
        if (bowlY > bowlSinkTargetY) bowlY = bowlSinkTargetY;
      }
      drawPlayer();
      // 分數／元氣 HUD 與結束字樣（不再疊加黑色半透明遮罩，畫面維持乾淨）
      drawScoreAndEnergyHUD();
      ctx.fillStyle = "#fff";
      ctx.font = "bold 48px Arial";
      ctx.lineWidth = 6;
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.strokeText("遊戲結束", 300, 300);
      ctx.fillText("遊戲結束", 300, 300);
      ctx.font = "36px Arial";
      ctx.fillStyle = "#0c0";
      ctx.fillText("分數: " + score, 320, 360);
      // --- 動畫結束，顯示排行榜 ---
      if (bowlY >= bowlSinkTargetY) {
        bowlY = bowlSinkTargetY; // 鎖定在水底
        // 新增：播放碗沉到底音效
        bowlSinkSound.currentTime = 0;
        bowlSinkSound.play();
        setTimeout(() => {
          let arr = addRank(score);
          showRankModal(score);
        }, 400);
        return;
      }
      animationId = requestAnimationFrame(gameLoop);
      return;
    }
    // 遊戲結束
    // --- 修改：只有沒垃圾動畫時才 gameOver ---
    let trashAnimating = trashes.some(trash => trash.lifting);
    if (timeLeft <= 0 && !gameOver && !trashAnimating && !pendingGameOver) {
      gameOver = true;
      displayTimeLeft = 0; // 修正：同步顯示歸零
      restartBtn.style.display = "block";
      // --- 修改：先播放「鍋蓋蓋下來」的動畫，鍋子先停止移動，蓋緊後才開始下沉 ---
      lidDropping = true;
      lidDropOffset = LID_DROP_START_OFFSET;
      animationId = requestAnimationFrame(gameLoop);
      // 排行榜會在下沉動畫真正結束後才顯示（見下方 bowlSinking 動畫結束處）
      return;
    }
    animationId = requestAnimationFrame(gameLoop);

    // === 緊張背景音效 ===
    if (!gameOver && timeLeft > 0) {
      let minInterval = 80; // 幾乎連續
      let maxInterval = 2000; // 最慢2秒
      let t = Math.max(0, Math.min(1, timeLeft / GAME_TIME));
      tensionSoundInterval = minInterval + (maxInterval - minInterval) * t;
      if (!lastTensionSoundTime) lastTensionSoundTime = currentTime;
      // 只有當音效沒在播放時才播放下一次
      if ((currentTime - lastTensionSoundTime >= tensionSoundInterval) && tensionSound.paused) {
        tensionSound.currentTime = 0;
        tensionSound.play();
        lastTensionSoundTime = currentTime;
      }
    } else {
      tensionSound.pause();
      tensionSound.currentTime = 0;
      lastTensionSoundTime = 0;
    }
  } catch (e) {
    // 若有錯誤，顯示在 console，並嘗試繼續下一幀
    console.error('gameLoop error:', e);
    animationId = requestAnimationFrame(gameLoop);
  }
}

// 響應式 canvas 尺寸調整
function resizeGameCanvas() {
  const GAME_WIDTH = 800;
  const GAME_HEIGHT = 600;
  let w = window.innerWidth;
  let h = window.innerHeight;
  let isLandscape = w > h;

  let scale;
  if (isLandscape) {
    // landscape: 以高度為主，維持 4:3
    h = window.innerHeight;
    w = Math.min(window.innerWidth, h * 4 / 3);
    scale = w / GAME_WIDTH;
  } else {
    // portrait: 以寬度為主，維持 4:3
    w = window.innerWidth;
    h = Math.min(window.innerHeight, w * 3 / 4);
    scale = h / GAME_HEIGHT;
  }

  // 設定 canvas 實際繪圖解析度
  canvas.width = GAME_WIDTH;
  canvas.height = GAME_HEIGHT;
  // 設定 CSS 尺寸
  canvas.style.width = (GAME_WIDTH * scale) + 'px';
  canvas.style.height = (GAME_HEIGHT * scale) + 'px';
  // 置中
  canvas.style.position = 'absolute';
  canvas.style.left = ((window.innerWidth - GAME_WIDTH * scale) / 2) + 'px';
  canvas.style.top = ((window.innerHeight - GAME_HEIGHT * scale) / 2) + 'px';
}
window.addEventListener('resize', resizeGameCanvas);
resizeGameCanvas();

// === 虛擬搖桿與螢幕按鈕 ===
(function() {
  function updateControlsVisibility() {
    const isLandscape = window.innerWidth > window.innerHeight;
    const isPortrait = window.innerWidth <= window.innerHeight;
    const isMobile = window.innerWidth <= 768;
    const joystick = document.getElementById('joystick');
    const screenButtons = document.getElementById('screenButtons');
    if (joystick && screenButtons) {
      if (isLandscape && window.innerWidth <= 900) {
        joystick.style.display = 'block';
        screenButtons.style.display = 'block';
      } else if (isPortrait && isMobile) {
        joystick.style.display = 'block';
        screenButtons.style.display = 'block';
      } else {
        joystick.style.display = 'none';
        screenButtons.style.display = 'none';
      }
      screenButtons.style.zIndex = 2000;
    }
  }
  window.addEventListener('resize', updateControlsVisibility);
  window.addEventListener('orientationchange', updateControlsVisibility);
  updateControlsVisibility();
  window.addEventListener('resize', () => setTimeout(updateKnobGeometry, 50));
  window.addEventListener('orientationchange', () => setTimeout(updateKnobGeometry, 50));
  setTimeout(updateKnobGeometry, 50);

  // 虛擬搖桿控制
  const joystick = document.getElementById('joystick');
  const knob = document.getElementById('joystick-knob');
  const directionIndicators = document.querySelectorAll('.direction-indicator');
  let dragging = false, startX = 0, startY = 0, baseRect = null;
  let joyDX = 0, joyDY = 0;
  let activeTouchId = null;
  let knobCenterOffset = 35; // 動態計算：底座與旋鈕置中所需的位移量
  let knobMaxDist = 45; // 動態計算：旋鈕可拖曳的最大距離

  function updateKnobGeometry() {
    if (!joystick || !knob) return;
    const baseSize = joystick.offsetWidth;
    const knobSize = knob.offsetWidth;
    knobCenterOffset = (baseSize - knobSize) / 2;
    // 讓旋鈕邊緣最遠可以貼到底座邊緣，並保留一點緩衝
    knobMaxDist = Math.max(20, baseSize / 2 - knobSize / 4);
  }

  function updateDirectionIndicators() {
    directionIndicators.forEach(indicator => {
      indicator.classList.remove('active');
    });
    if (Math.abs(joyDX) > 0.1 || Math.abs(joyDY) > 0.1) {
      let direction = '';
      if (joyDY < -0.3) direction += 'up';
      else if (joyDY > 0.3) direction += 'down';
      if (joyDX < -0.3) direction += '-left';
      else if (joyDX > 0.3) direction += '-right';
      if (direction.includes('-')) {
        const indicator = document.querySelector(`.direction-indicator.${direction}`);
        if (indicator) indicator.classList.add('active');
      } else if (direction) {
        const indicator = document.querySelector(`.direction-indicator.${direction}`);
        if (indicator) indicator.classList.add('active');
      }
    }
  }

  function resetJoystick() {
    dragging = false;
    activeTouchId = null;
    knob.style.left = knobCenterOffset + 'px';
    knob.style.top = knobCenterOffset + 'px';
    joyDX = 0; joyDY = 0;
    keyState.left = keyState.right = keyState.up = keyState.down = false;
    directionIndicators.forEach(indicator => {
      indicator.classList.remove('active');
    });
  }

  function moveKnobTo(clientX, clientY) {
    let dx = clientX - startX;
    let dy = clientY - startY;
    const maxDist = knobMaxDist;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > maxDist) {
      dx = dx * maxDist / dist;
      dy = dy * maxDist / dist;
    }
    knob.style.left = (knobCenterOffset + dx) + 'px';
    knob.style.top = (knobCenterOffset + dy) + 'px';
    joyDX = dx / maxDist;
    joyDY = dy / maxDist;
    keyState.left = joyDX < -0.2;
    keyState.right = joyDX > 0.2;
    keyState.up = joyDY < -0.2;
    keyState.down = joyDY > 0.2;
    updateDirectionIndicators();
  }

  if (joystick && knob) {
    // 綁在整個底座（外圈）上，而不是只綁在中間的小旋鈕上，
    // 這樣玩家點在搖桿範圍內任何地方都能立刻開始拖曳，大幅提升靈敏度
    joystick.addEventListener('touchstart', function(e) {
      if (dragging) return;
      dragging = true;
      updateKnobGeometry();
      const touch = e.changedTouches[0];
      activeTouchId = touch.identifier;
      baseRect = joystick.getBoundingClientRect();
      startX = baseRect.left + baseRect.width / 2;
      startY = baseRect.top + baseRect.height / 2;
      // 立刻把旋鈕移動到手指按下的位置，減少「按了沒反應」的感覺
      moveKnobTo(touch.clientX, touch.clientY);
      e.preventDefault();
      e.stopPropagation();
    }, { passive: false });

    document.addEventListener('touchmove', function(e) {
      if (!dragging) return;
      let touch = null;
      for (let t of e.touches) {
        if (t.identifier === activeTouchId) {
          touch = t;
          break;
        }
      }
      if (!touch) return;
      moveKnobTo(touch.clientX, touch.clientY);
      e.preventDefault();
    }, {passive: false});

    document.addEventListener('touchend', function(e) {
      if (!dragging) return;
      let stillTouching = false;
      for (let t of e.touches) {
        if (t.identifier === activeTouchId) {
          stillTouching = true;
          break;
        }
      }
      if (stillTouching) return;
      resetJoystick();
    }, {passive: false});

    // 補上 touchcancel：觸控常會被系統手勢、多指觸控等中斷而不會觸發 touchend，
    // 若沒處理這個事件，dragging 會卡在 true，導致搖桿之後完全沒反應
    document.addEventListener('touchcancel', function(e) {
      if (!dragging) return;
      let stillTouching = false;
      for (let t of e.touches) {
        if (t.identifier === activeTouchId) {
          stillTouching = true;
          break;
        }
      }
      if (stillTouching) return;
      resetJoystick();
    }, {passive: false});
  }

  // 虛擬按鈕控制
  const actionBtn = document.getElementById('actionBtn');
  if (actionBtn) {
    function triggerFishingAction(e) {
      if (!fishing && !hookThrowing && !gameOver) {
        startHookCast();
      }
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
    }
    actionBtn.addEventListener('touchstart', triggerFishingAction, { passive: false });
    actionBtn.addEventListener('click', triggerFishingAction);
  }

  function triggerFishingFromCanvas(e) {
    if (!fishing && !hookThrowing && !gameOver) {
      startHookCast();
    }
    if (e) e.preventDefault();
  }
  canvas.addEventListener('click', triggerFishingFromCanvas);
  canvas.addEventListener('touchstart', triggerFishingFromCanvas);
})();

// ============================================================
// 【調參面板】把 LINE_PARAMS_META 動態轉成可拖拉的滑桿 + 數字輸入框，
// 並提供「複製目前參數」「套用貼上的參數」「還原預設值」三個功能，
// 讓玩家可以把調好的參數複製起來，重開網頁後貼回去就能快速套用。
// ============================================================
(function() {
  function buildParamPanel() {
    const container = document.getElementById('paramSliders');
    if (!container) return;
    container.innerHTML = '';

    // 先把 meta 依 key 建立索引，方便依分類查找
    const metaByKey = {};
    LINE_PARAMS_META.forEach(function(meta) {
      metaByKey[meta[1]] = meta;
    });

    function buildRow(meta) {
      const label = meta[0], key = meta[1], min = meta[2], max = meta[3], step = meta[4];

      const row = document.createElement('div');
      row.className = 'param-row';

      const top = document.createElement('div');
      top.className = 'param-row-top';

      const labelEl = document.createElement('label');
      // 只顯示分類前綴之後的說明文字（避免每一列都重複「線-」「鉤-」字樣）
      const shortLabel = label.replace(/^(線|鉤)-/, '');
      labelEl.textContent = shortLabel;
      labelEl.title = label;
      labelEl.htmlFor = 'param-range-' + key;

      const num = document.createElement('input');
      num.type = 'number';
      num.id = 'param-num-' + key;
      num.min = min;
      num.max = max;
      num.step = step;
      num.value = LINE_PARAMS[key];
      num.className = 'param-num';

      top.appendChild(labelEl);
      top.appendChild(num);

      const range = document.createElement('input');
      range.type = 'range';
      range.id = 'param-range-' + key;
      range.min = min;
      range.max = max;
      range.step = step;
      range.value = LINE_PARAMS[key];

      function updateValue(v) {
        let val = parseFloat(v);
        if (isNaN(val)) return;
        val = Math.max(min, Math.min(max, val));
        LINE_PARAMS[key] = val;
        range.value = val;
        num.value = val;
      }

      range.addEventListener('input', function() { updateValue(range.value); });
      // 拖曳中維持焦點（不影響拖動手感），但一放開就立刻失焦，
      // 讓鍵盤事件（方向鍵、空白鍵等）可以馬上回到遊戲操作，不會被滑桿吃掉
      range.addEventListener('change', function() { range.blur(); });
      range.addEventListener('mouseup', function() { range.blur(); });
      range.addEventListener('touchend', function() { range.blur(); });
      num.addEventListener('change', function() { updateValue(num.value); num.blur(); });

      row.appendChild(top);
      row.appendChild(range);
      return row;
    }

    // 依分類產生可折疊區塊；每個分類都是一個 <details>，標題點一下可展開/收合
    PARAM_CATEGORIES.forEach(function(cat) {
      const details = document.createElement('details');
      details.className = 'param-group';
      details.dataset.kind = cat.kind;
      details.open = true;

      const summary = document.createElement('summary');
      const titleSpan = document.createElement('span');
      titleSpan.textContent = cat.title;
      const countSpan = document.createElement('span');
      countSpan.className = 'param-group-count';
      countSpan.textContent = cat.keys.length + ' 項';
      summary.appendChild(titleSpan);
      summary.appendChild(countSpan);

      const body = document.createElement('div');
      body.className = 'param-group-body';

      cat.keys.forEach(function(key) {
        const meta = metaByKey[key];
        if (!meta) return; // 保護：分類設定裡若打錯 key 就跳過，不讓面板整個壞掉
        body.appendChild(buildRow(meta));
      });

      details.appendChild(summary);
      details.appendChild(body);
      container.appendChild(details);
    });

    // 保護：如果有參數忘了放進 PARAM_CATEGORIES，仍會列在最後的「其他」分類，避免遺漏
    const categorizedKeys = new Set(PARAM_CATEGORIES.reduce(function(acc, c) { return acc.concat(c.keys); }, []));
    const leftover = LINE_PARAMS_META.filter(function(meta) { return !categorizedKeys.has(meta[1]); });
    if (leftover.length) {
      const details = document.createElement('details');
      details.className = 'param-group';
      details.dataset.kind = 'other';
      details.open = true;
      const summary = document.createElement('summary');
      const titleSpan = document.createElement('span');
      titleSpan.textContent = '⚙️ 其他';
      const countSpan = document.createElement('span');
      countSpan.className = 'param-group-count';
      countSpan.textContent = leftover.length + ' 項';
      summary.appendChild(titleSpan);
      summary.appendChild(countSpan);
      const body = document.createElement('div');
      body.className = 'param-group-body';
      leftover.forEach(function(meta) { body.appendChild(buildRow(meta)); });
      details.appendChild(summary);
      details.appendChild(body);
      container.appendChild(details);
    }
  }

  function refreshParamPanelValues() {
    LINE_PARAMS_META.forEach(function(meta) {
      const key = meta[1];
      const range = document.getElementById('param-range-' + key);
      const num = document.getElementById('param-num-' + key);
      if (range) range.value = LINE_PARAMS[key];
      if (num) num.value = LINE_PARAMS[key];
    });
  }

  function showStatus(msg, ms) {
    const statusEl = document.getElementById('paramCopyStatus');
    if (!statusEl) return;
    statusEl.textContent = msg;
    setTimeout(function() { statusEl.textContent = ''; }, ms || 2500);
  }

  const paramPanelBtn = document.getElementById('paramPanelBtn');
  const paramPanel = document.getElementById('paramPanel');
  const closeParamPanel = document.getElementById('closeParamPanel');
  const paramTextArea = document.getElementById('paramTextArea');
  const copyParamsBtn = document.getElementById('copyParamsBtn');
  const applyParamsBtn = document.getElementById('applyParamsBtn');
  const resetParamsBtn = document.getElementById('resetParamsBtn');

  if (paramPanelBtn && paramPanel) {
    paramPanelBtn.addEventListener('click', function() {
      const willShow = paramPanel.style.display === 'none';
      paramPanel.style.display = willShow ? 'flex' : 'none';
      paramPanelOpen = willShow;
      if (willShow) refreshParamPanelValues();
      paramPanelBtn.blur();
    });
  }
  if (closeParamPanel && paramPanel) {
    closeParamPanel.addEventListener('click', function() {
      paramPanel.style.display = 'none';
      paramPanelOpen = false;
      closeParamPanel.blur();
    });
  }
  if (copyParamsBtn && paramTextArea) {
    copyParamsBtn.addEventListener('click', function() {
      const json = JSON.stringify(LINE_PARAMS, null, 2);
      paramTextArea.value = json;
      let copied = false;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(json);
          copied = true;
        }
      } catch (e) { /* 忽略，走下方 fallback */ }
      if (!copied) {
        try {
          paramTextArea.select();
          document.execCommand('copy');
          copied = true;
        } catch (e) { /* 忽略 */ }
      }
      showStatus(copied ? '已複製到剪貼簿！可以貼到別的地方保存。' : '已顯示在下方文字框，請手動全選複製。');
      copyParamsBtn.blur();
      paramTextArea.blur();
    });
  }
  if (applyParamsBtn && paramTextArea) {
    applyParamsBtn.addEventListener('click', function() {
      try {
        const parsed = JSON.parse(paramTextArea.value);
        Object.keys(parsed).forEach(function(key) {
          if (Object.prototype.hasOwnProperty.call(LINE_PARAMS, key) && typeof parsed[key] === 'number') {
            LINE_PARAMS[key] = parsed[key];
          }
        });
        refreshParamPanelValues();
        showStatus('參數已套用！');
      } catch (e) {
        showStatus('格式錯誤，請確認貼上的是完整的參數 JSON。', 3000);
      }
      applyParamsBtn.blur();
      paramTextArea.blur();
    });
  }
  if (resetParamsBtn) {
    resetParamsBtn.addEventListener('click', function() {
      Object.assign(LINE_PARAMS, JSON.parse(JSON.stringify(LINE_PARAMS_DEFAULTS)));
      refreshParamPanelValues();
      showStatus('已還原成預設值。');
      resetParamsBtn.blur();
    });
  }

  buildParamPanel();
})();

// 初始化
// 停止殘留動畫和計時
if (animationId) cancelAnimationFrame(animationId);
if (countdownTimer) clearTimeout(countdownTimer);
// 重置時間控制變數
lastTime = 0;
deltaTime = 0;
spawnFish();
spawnTrash();
initLinePoints();
specialSeaCreature = null;
if (specialSeaCreatureTimer) clearTimeout(specialSeaCreatureTimer);
scheduleSpecialSeaCreature();
if (fishSchoolTimer) clearTimeout(fishSchoolTimer);
if (fishSchoolBatchTimer) clearInterval(fishSchoolBatchTimer);
scheduleFishSchool();
resizeGameCanvas();
// --- 新增：重設鍋子位置與動畫狀態 ---
bowlY = pot.y;
bowlX = pot.x;
bowlXDir = 1;
bowlSinking = false;
bowlSinkTargetY = null;
bowlY_vel = 0;
bowlImpulseY = 0; // 重置碗下沉衝擊
lidDropping = false;
lidDropOffset = 0;
animationId = requestAnimationFrame(gameLoop);

// 新增：拉起釣竿音效
const rodPullSound = new Audio('sound/Data_1.wav');
// 新增：釣到東西音效
const catchSound = new Audio('sound/Data_2.wav');
// 新增：釣到東西音效2
const catchSound2 = new Audio('sound/Data_3.wav');
// 新增：釣到食物音效（加時間）
const foodSounds = [
  new Audio('sound/Data_10.wav'),
  new Audio('sound/Data_11.wav'),
  new Audio('sound/Data_12.wav'),
  new Audio('sound/Data_13.wav'),
  new Audio('sound/Data_14.wav')
];

// 隨機播放食物音效（延遲1秒）
function playRandomFoodSound() {
  const idx = Math.floor(Math.random() * foodSounds.length);
  const sound = foodSounds[idx];
  if (sound) { 
    sound.currentTime = 0; 
    setTimeout(() => sound.play(), 1000); // 延遲1秒播放
  }
}

// 將 catchSound 播放改為隨機播放 catchSound 或 catchSound2
function playRandomCatchSound() {
  const sound = Math.random() < 0.5 ? catchSound : catchSound2;
  if (sound) { sound.currentTime = 0; sound.play(); }
}

// 新增：扣元氣物品消失音效
const penaltySound = new Audio('sound/Data_15.wav');
// 新增：碗沉到底音效
const bowlSinkSound = new Audio('sound/Data_16.wav');

let isMuted = false;

function setAllAudioMuted(muted) {
  tensionSound.muted = muted;
  rodPullSound.muted = muted;
  catchSound.muted = muted;
  catchSound2.muted = muted;
  penaltySound.muted = muted;
  bowlSinkSound.muted = muted;
  if (Array.isArray(foodSounds)) {
    foodSounds.forEach(s => s.muted = muted);
  }
}

window.toggleMute = function() {
  isMuted = !isMuted;
  setAllAudioMuted(isMuted);
  // 切換 emoji
  const btn = document.getElementById('muteBtn');
  const emojiOn = document.getElementById('muteEmojiOn');
  const emojiOff = document.getElementById('muteEmojiOff');
  if (btn) btn.setAttribute('aria-pressed', isMuted ? 'true' : 'false');
  if (emojiOn) emojiOn.style.display = isMuted ? 'none' : 'inline';
  if (emojiOff) emojiOff.style.display = isMuted ? 'inline' : 'none';
};

document.addEventListener('DOMContentLoaded', function() {
  const btn = document.getElementById('muteBtn');
  if (btn) btn.addEventListener('click', window.toggleMute);
  setAllAudioMuted(isMuted);
  // 根據 isMuted 設定 emoji 狀態
  const emojiOn = document.getElementById('muteEmojiOn');
  const emojiOff = document.getElementById('muteEmojiOff');
  if (btn) btn.setAttribute('aria-pressed', isMuted ? 'true' : 'false');
  if (emojiOn) emojiOn.style.display = isMuted ? 'none' : 'inline';
  if (emojiOff) emojiOff.style.display = isMuted ? 'inline' : 'none';
});
</script>
