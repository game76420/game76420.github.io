    this.divingMovement = false;
    this.diveDirection = null;

    // 殺球容錯視窗：玩家按下殺球鍵那一刻（且當時正在跳躍），先把這個旗標打開，
    // 之後每一格畫面都持續檢查球有沒有撞到，直到真的撞到、或落地為止才關閉，
    // 不再要求「按下的那一格畫面」剛好跟球重疊，跟 AI 的 willSpike 邏輯一致。
    this.spikeArmed = false;

    // 擊球瞬間短暫播放的動畫（跟 this.state 分開，不影響移動/跳躍/飛撲的狀態機，
    // 純粹是畫面上蓋一層擊球姿勢，播完 5 張圖就自動關閉，回到平常的圖）
    this.hitAnimActive = false;
    this.hitAnimFrame = 0;
    this.hitAnimTimer = 0;

    this.flip = side === "right";
  }

  // 一般（非跳躍殺球/非飛撲）碰到球時呼叫：播一次 pikachu_hit_1~5.png
  playHitAnim() {
    this.hitAnimActive = true;
    this.hitAnimFrame = 0;
    this.hitAnimTimer = 0;
  }

  get rect() {
    // 擊球碰撞箱大小可另外用 GAME_PARAMS.hitboxWidthGround / hitboxWidthJump / hitboxHeight 調整，
    // 跟精靈圖本身的畫面大小（this.width/this.height）分開，改碰撞箱不會影響圖片顯示大小。
    // 站在地面時用 hitboxWidthGround（較窄，避免站著不動就穩贏），
    // 跳起來之後（this.isJumping）改用 hitboxWidthJump（較寬，方便跳躍中判定擊球/殺球）。
    // 垂直以腳底（this.y + this.height）對齊，這樣調高度時角色腳底還是貼在地面上。
    // 水平方向不再置中縮減，而是「前方（面向球網那一側）貼齊圖片邊緣、只從背後（面向球場外側那一側）
    // 縮減」：左側角色面向右邊（球網在右邊），所以縮減的部分從左邊（背後）扣掉；
    // 右側角色面向左邊，縮減的部分則從右邊（背後）扣掉。這樣站在原地時，
    // 球只要繞到角色背後就碰不到，不會單純站著不動就穩贏。
    const w = this.isJumping
      ? (GAME_PARAMS.hitboxWidthJump || this.width)
      : (GAME_PARAMS.hitboxWidthGround || this.width);
    const h = GAME_PARAMS.hitboxHeight || this.height;
    const x = this.side === "left"
      ? this.x + (this.width - w)   // 左側角色：前方（右邊）貼齊，從左邊（背後）縮減
      : this.x;                      // 右側角色：前方（左邊）貼齊，從右邊（背後）縮減
    return {
      x,
      y: this.y + (this.height - h),
      w,
      h
    };
  }

  // 專門給「跳躍殺球」判定用的碰撞箱：在基本碰撞箱（this.rect）上，
  // 往上額外延伸一段距離（GAME_PARAMS.spikeHitboxExtra），讓球還沒完全貼到角色本體、
  // 只是掠過頭頂上方時，跳躍中也能判定成殺球；
  // 另外還往「精靈面向的前方」（左側角色朝右、右側角色朝左，也就是面對球網的方向）
  // 加寬一段距離（GAME_PARAMS.spikeHitboxForward），方便殺一顆稍微在前面一點的球。
  // 一般的落地碰球仍然用原本的 rect，不會被放大。
  get spikeRect() {
    const base = this.rect;
    const extraUp = GAME_PARAMS.spikeHitboxExtra || 0;
    const extraForward = GAME_PARAMS.spikeHitboxForward || 0;
    let x = base.x;
    let w = base.w;
    if (extraForward) {
      if (this.side === "left") {
        // 左側角色面向右邊，往右（x 增加的方向）加寬
        w += extraForward;
      } else {
        // 右側角色面向左邊，往左（x 減少的方向）加寬
        x -= extraForward;
        w += extraForward;
      }
    }
    return { x, y: base.y - extraUp, w, h: base.h + extraUp };
  }

  move(direction, net, speed) {
    // 飛撲中鎖死方向鍵：一旦開始飛撲，就讓飛撲自己的位移邏輯（divingMovement/diveTargetX）
    // 獨佔控制權，直到飛撲結束、落地站穩為止；玩家或 AI 這時按左右都不會再生效。
    // 這樣飛撲方向（diveDirection，也就是翻面用的依據）從頭到尾只會被設定一次，
    // 不會被中途的移動指令打架，從根本上避免精靈中途轉向、圖案跟移動方向對不上的問題。
    if (this.diveMode) return;
    // speed 可由呼叫端覆寫（AI 追預測落點時會傳入比 playerSpeed 快一點的速度），
    // 不傳就沿用原本玩家/AI 共用的 GAME_PARAMS.playerSpeed，玩家操作完全不受影響。
    const stepSpeed = speed !== undefined ? speed : GAME_PARAMS.playerSpeed;
    const minX = this.side === "left" ? 0 : SCREEN_WIDTH / 2;
    const maxX = this.side === "left" ? SCREEN_WIDTH / 2 : SCREEN_WIDTH;
    if (direction === "left" && this.x > minX) {
      this.x -= stepSpeed;
      if (!this.diveMode && !this.isJumping) this.state = "run";
    } else if (direction === "right" && this.x + this.width < maxX) {
      this.x += stepSpeed;
      if (!this.diveMode && !this.isJumping) this.state = "run";
    } else {
      if (!this.diveMode && !this.isJumping) this.state = "idle";
    }
  }

  jump() {
    if (!this.isJumping && !this.diveMode) {
      this.isJumping = true;
      this.vy = GAME_PARAMS.jumpVelocity;
      this.state = "jump";
      this.frame = 0;
      this.animTimer = 0;
      playSound(sounds.jump);
    }
  }

  dive(direction, netRect) {
    if (!this.isJumping && !this.diveMode) {
      this.diveMode = true;
      this.state = "dive";
      this.frame = 0;
      this.animTimer = 0;
      this.diveTimer = 0;
      this.vy = GAME_PARAMS.diveInitialVY;
      const diveDistance = GAME_PARAMS.diveDistance;
      this.diveDirection = direction;

      if (direction === "left") {
        const limit = this.side === "left" ? 0 : netRect.x + netRect.w;
        this.diveTargetX = Math.max(this.x - diveDistance, limit);
      } else {
        const limit = this.side === "left" ? netRect.x - this.width : SCREEN_WIDTH - this.width;
        this.diveTargetX = Math.min(this.x + diveDistance, limit);
      }
      this.divingMovement = true;
    }
  }

  update(ball) {
    // 動畫：換圖間隔改由 GAME_PARAMS 控制，數字越大換圖越慢（撥放速度越慢）
    this.animTimer++;
    const threshold = this.state === "dive" ? GAME_PARAMS.diveAnimInterval : GAME_PARAMS.spriteAnimInterval;
    if (this.animTimer >= threshold) {
      if (this.diveMode) {
        if (this.y + this.height < GROUND_Y) {
          this.frame = Math.min(1, this.frame + 1);
        } else {
          this.frame = 2;
        }
      } else {
        const frameCount = this.state === "dive" ? 3 : 5;
        this.frame = (this.frame + 1) % frameCount;
      }
      this.animTimer = 0;
    }

    // 擊球瞬間動畫：跟上面的 this.frame 完全分開計算，播完 5 張（0~4）就自動關閉
    if (this.hitAnimActive) {
      this.hitAnimTimer++;
      if (this.hitAnimTimer >= GAME_PARAMS.hitAnimInterval) {
        this.hitAnimTimer = 0;
        this.hitAnimFrame++;
        if (this.hitAnimFrame >= 5) {
          this.hitAnimActive = false;
          this.hitAnimFrame = 0;
        }
      }
    }

    // 移動狀態下的水平飛撲位移
    if (this.divingMovement && this.diveMode) {
      const diveSpeed = GAME_PARAMS.diveSpeed;
      if (Math.abs(this.x - this.diveTargetX) <= diveSpeed) {
        this.x = this.diveTargetX;
        this.divingMovement = false;
      } else if (this.x < this.diveTargetX) {
        this.x += diveSpeed;
      } else {
        this.x -= diveSpeed;
      }
    }

    // 重力 / 跳躍 / 飛撲垂直運動
    // 改成跟原版 physics.js（FUN_00401fc0）一樣的離散公式：
    // 「先用『這一格』的速度移動位置，移動完之後才把重力加進『下一格』要用的速度」，
    // 而且是否要繼續加重力，要看「移動完之後有沒有超過地面」才決定，
    // 不是像連續物理那樣每格都無條件加重力。
    if (this.isJumping || (this.diveMode && !this.diveLanded)) {
      const touchY = GROUND_Y - this.height; // 相當於原版的 PLAYER_TOUCHING_GROUND_Y_COORD
      const futureY = this.y + this.vy;
      this.y = futureY;
      if (futureY < touchY) {
        // 還在空中，才繼續加重力（原版：yVelocity += 1）
        this.vy += GAME_PARAMS.gravity;
      } else if (futureY > touchY) {
        // 落地：直接吸附在地面上，速度歸零（原版是硬吸附，不是慢慢停下來）
        this.y = touchY;
        this.vy = 0;
        this.isJumping = false;
        this.spikeArmed = false; // 落地代表這次跳躍結束，殺球容錯視窗一併關閉
        if (this.diveMode) {
          // 原版：飛撲落地那一刻才切換成「躺地」狀態，並從這一刻才開始倒數，
          // 飛撲過程中在空中飛的那段時間不算在僵直時間內（這跟舊版直接從按下飛撲鍵就開始倒數不同）。
          this.diveLanded = true;
          this.diveTimer = 0;
        }
      }
      // futureY === touchY 這種剛好對齊的情況（浮點數下極少發生）：原版兩個分支都不進，
      // 位置/速度維持原樣，這裡自然也是同樣行為，不用特別處理。
    }

    // 飛撲落地後的「躺地」僵直：原版在這段期間完全不處理任何 x/y 移動，玩家操作也無效
    // （Pikachu.move() 開頭已經用 this.diveMode 擋掉移動輸入，這裡只需負責倒數與恢復站立）。
    if (this.diveMode && this.diveLanded) {
      this.diveTimer++;
      if (this.diveTimer >= GAME_PARAMS.diveDuration) {
        this.diveMode = false;
        this.diveLanded = false;
        this.state = "idle";
        this.frame = 0;
        this.diveTimer = 0;
      }
    }

    // 飛撲中撞球：原版裡「飛撲」跟「跳躍中按擊球鍵殺球」是兩種不同的碰撞情境，
    // 飛撲本身沒有專屬的強力公式，飛撲觸球用的是跟一般站立碰球「完全相同」的弱擊球公式
    // （球會被頂回去，但不會像殺球那麼兇狠——這是原版刻意的設計：飛撲是救球，不是攻擊）。
    if (this.diveMode && ball && rectsOverlap(this.rect, ball.rect)) {
      resolveBallHit(ball, this, /* isPowerHit */ false, 0, 0);
      ball.addSparks();
      playSound(sounds.slam);
    }
  }

  draw(ctx) {
    if (!assetsReady) return;
    let sheet, sx, sy, sw, sh, drawW, drawH, drawY;
    if (this.state === "dive") {
      // 飛撲改用 3 張獨立圖檔（pikachu_swoop_1.png ~ pikachu_swoop_3.png），
      // this.frame（0~2）直接對應陣列索引，不用再切格（sx/sy 都是 0）。
      sheet = images.pikachuSwoopFrames[this.frame];
      sx = 0;
      sy = 0;
      sw = SWOOP_W;
      sh = SWOOP_H;
      drawW = SWOOP_W;
      drawH = SWOOP_H;
      drawY = this.y - (SWOOP_H - SPRITE_H);
    } else if (this.hitAnimActive) {
      // 擊球瞬間動畫（pikachu_hit_1.png ~ pikachu_hit_5.png），59x54，
      // 只在一般碰球（非跳躍殺球/非飛撲）時短暫蓋在平常姿勢上面播一次。
      sheet = images.pikachuHitFrames[this.hitAnimFrame];
      sx = 0;
      sy = 0;
      sw = HIT_W;
      sh = HIT_H;
      drawW = HIT_W;
      drawH = HIT_H;
      // 垂直：讓腳底對齊跟平常站立時一樣的地面高度（圖比平常矮，所以往下修正）
      drawY = this.y - (HIT_H - SPRITE_H);
    } else if (this.state === "jump") {
      // 跳躍狀態改用專用的 5 張圖檔（pikachu_jmp_1.png ~ pikachu_jmp_5.png），
      // 圖檔實際尺寸是 59x59（比平常的 55x56 稍大），所以照原始大小畫出來，
      // 不硬壓縮成 55x56，避免變形。
      sheet = images.pikachuJumpFrames[this.frame];
      sx = 0;
      sy = 0;
      sw = JUMP_W;
      sh = JUMP_H;
      drawW = JUMP_W;
      drawH = JUMP_H;
      // 垂直：讓腳底對齊跟平常站立時一樣的地面高度（跟 dive/swoop 的做法相同）
      drawY = this.y - (JUMP_H - SPRITE_H);
    } else {
      // 平常狀態（idle/run）改用 5 張獨立圖檔（pikachu_1.png ~ pikachu_5.png），
      // this.frame（0~4）直接對應陣列索引，取的是整張圖，不用再切格（sx/sy 都是 0）。
      sheet = images.pikachuFrames[this.frame];
      sx = 0;
      sy = 0;
      sw = SPRITE_W;
      sh = SPRITE_H;
      drawW = SPRITE_W;
      drawH = SPRITE_H;
      drawY = this.y;
    }

    let shouldFlip;
    if (this.state === "dive") {
      // 飛撲圖檔（pikachu_swoop_1~3.png）本身就是「朝右撲」的畫面，
      // 跟平常站立圖（pikachu_1~5.png）同一套朝右的預設方向一致，
      // 所以只要看「飛撲方向」本身：往右撲不用翻，往左撲才翻。
      // 這裡不該再看 this.side，不然像左側玩家退到底、往前（右）飛撲時，
      // 反而會被判定成要翻面，變成精靈臉朝後倒退撲過去的怪異畫面。
      shouldFlip = this.diveDirection === "left";
    } else {
      shouldFlip = this.side === "right";
    }

    // 座標一律取整數再拿去畫：鏡像側（scale(-1,1)）如果用到小數座標，
    // 在關閉平滑（imageSmoothingEnabled=false）的情況下很容易被裁掉邊緣 1px，
    // 之前玩家側鼻子不見就是這個原因，所以畫之前先四捨五入成整數像素。
    // 跳躍圖／擊球圖都比碰撞箱寬（55），水平置中對齊，兩側鏡射時才不會歪一邊
    // （飛撲 swoop 維持原本不置中的做法，因為那是有方向性的撲球動作，不需要置中）。
    const centerOffsetX = (this.state === "jump" || this.hitAnimActive) ? (SPRITE_W - drawW) / 2 : 0;
    const drawX = Math.round(this.x + centerOffsetX);
    drawY = Math.round(drawY);

    ctx.save();
    if (shouldFlip) {
      ctx.translate(drawX + drawW, drawY);
      ctx.scale(-1, 1);
      ctx.drawImage(sheet, sx, sy, sw, sh, 0, 0, drawW, drawH);
    } else {
      ctx.drawImage(sheet, sx, sy, sw, sh, drawX, drawY, drawW, drawH);
    }
    ctx.restore();
  }
}

// ---------- 球路徑預測 ----------
// 用跟 Volleyball.update()「完全相同」的物理公式（重力、邊界反彈、地板反彈、
// 球網碰撞）把球目前的位置與速度往前模擬很多個 tick，算出球最終會落在哪個 x 座標。
// 這樣 AI 就能在球還沒飛到面前之前，提前移動到預測落點卡位，而不是每格畫面
// 只看球「現在」在哪裡才反應。
// 回傳值：{ x: 預測落點的 x 座標(球中心), path: 取樣後的軌跡點陣列，供除錯畫面畫虛線用 }
function predictBallTrajectory(ball, netRect) {
  let x = ball.x, y = ball.y, vx = ball.vx, vy = ball.vy;
  const w = ball.width, h = ball.height;
  const gravity = GAME_PARAMS.ballGravity;
  const restitution = GAME_PARAMS.ballBounceRestitution;
  const maxSteps = GAME_PARAMS.aiPredictionMaxSteps || 900;
  const path = [{ x: x + w / 2, y: y + h / 2 }];
  // fullPath：每一格畫面都記錄一次（不像 path 是每 3 格取樣一次，只給除錯畫面畫虛線用），
  // 這樣 AI 才能精準查出「再過 N 格畫面，球會在哪個座標」，用來抓準起跳時機，
  // 而不必等球「現在」飛到夠近才反應。
  // 額外記錄每一格畫面的 vy（不只 x/y），這樣之後模擬「如果在這一格畫面打這顆球」時，
  // 才能用跟球當下真正一致的垂直速度去算擊球公式，而不是用一個猜測值。
  const fullPath = [{ x: x + w / 2, y: y + h / 2, vy: vy }];

  // 這裡的每一步都跟 Volleyball.update() 用完全一樣的判斷順序/公式，
  // AI 才能準確預測出球實際會落在哪裡（不然預測跟實際物理兜不起來，AI 會卡位卡錯地方）。
  for (let i = 0; i < maxSteps; i++) {
    const futureX = x + vx;
    if (futureX < 0 || futureX > SCREEN_WIDTH - w) {
      vx = -vx * restitution;
    }

    if (y + vy < 0) {
      vy = 1;
    }

    if (netRect) {
      const netCenterX = netRect.x + netRect.w / 2;
      const ballCenterX = x + w / 2;
      const netTopY = netRect.y;
      const netCapBottomY = netRect.y + GAME_PARAMS.netTopCapHeight;
      if (Math.abs(ballCenterX - netCenterX) < GAME_PARAMS.netCollisionHalfWidth && y > netTopY) {
        if (y <= netCapBottomY) {
          if (vy > 0) vy = -vy * restitution;
        } else {
          if (x < netCenterX) vx = -Math.abs(vx) * restitution;
          else vx = Math.abs(vx) * restitution;
        }
      }
    }

    let landed = false;
    const futureY = y + vy;
    if (futureY + h >= GROUND_Y) {
      vy = -vy * restitution;
      y = GROUND_Y - h;
      landed = true; // 模擬到落地，這就是球最終的落點，不用再繼續往下模擬
    } else {
      y = futureY;
      x = x + vx;
      vy += gravity;
    }

    if (i % 3 === 0 || landed) path.push({ x: x + w / 2, y: y + h / 2 });
    fullPath.push({ x: x + w / 2, y: y + h / 2, vy: vy });
    if (landed) return { x: x + w / 2, path, fullPath, steps: i + 1 };
  }

  return { x: x + w / 2, path, fullPath, steps: maxSteps };
}

// 模擬「如果我在 (hitX, hitY) 這個位置，用 (hitVx, hitVy) 這個初速把球打出去」，
// 球最後的完整落點資訊——直接借用跟 predictBallTrajectory 完全相同的物理公式
// （重力、地板、球網頂端圓帽/側面反彈、左右邊界反彈），確保模擬出來的結果
// 跟球實際飛行的結果一致，不是另外寫一套簡化公式亂猜。
function simulatePostHit(hitX, hitY, hitVx, hitVy, netRect) {
  const fakeBall = {
    x: hitX - GAME_PARAMS.ballWidth / 2,
    y: hitY - GAME_PARAMS.ballHeight / 2,
    vx: hitVx,
    vy: hitVy,
    width: GAME_PARAMS.ballWidth,
    height: GAME_PARAMS.ballHeight,
  };
  return predictBallTrajectory(fakeBall, netRect); // { x: 落地時球中心x, steps: 落地要花幾格畫面, ... }
}

// 判斷「這一下打出去，最後會不會反而讓自己這邊丟分（自殺球）」。
// 最常見的成因是：殺球打得太用力、太靠近網子，球撞到網子彈回來，
// 又飛回自己這一側落地——原本想攻擊對面，結果球網幫對面把球擋回來、自己反而丟分。
// isLeftSide：這顆球是哪一側的角色打出去的（true=左側/AI，false=右側/玩家）。
function willHitSelfDestruct(hitX, hitY, hitVx, hitVy, netRect, isLeftSide) {
  const landingX = simulatePostHit(hitX, hitY, hitVx, hitVy, netRect).x;
  const netCenterX = SCREEN_WIDTH / 2;
  // 落點還在自己這一側 = 這一球等於是自己把球送回自己家門口，判定為「自殺球」
  return isLeftSide ? landingX < netCenterX : landingX > netCenterX;
}

// ---- 原版特有的「瞄準弱點」邏輯 ----
// 原版按鍵殺球時，左右鍵決定力道是否加倍、上/放開/下鍵決定球是「高吊」「平擊」還是「重扣」，
// 組合起來會落在球場上不同的位置。這裡讓 AI 在真正出手前，把每一種組合都「先在腦內打一次」，
// 模擬出每種打法最後的落點，再比對對手目前站的位置跟腳程，挑一個對手最沒把握救到的組合出手，
// 而不是像過去那樣每次都死板地固定用「前+下」硬扣。
// 回傳 { xDir, yDir, landingX, steps, margin }（margin 越大代表對手越沒機會救到）；
// 如果每一種組合都會自殺（例如卡在網邊很尷尬的位置），回傳 null。
function chooseBestSpikeDirection(contactPoint, netRect, opponent, isLeftSide) {
  const netCenterX = SCREEN_WIDTH / 2;
  const xDirChoices = [0, 1]; // 原版：左右鍵只影響力道是否加倍，不影響球飛的方向（方向永遠是往對面）
  const yDirChoices = [-1, 0, 1]; // 上（高吊）／放開（平擊）／下（重扣）
  let best = null;

  for (const xDir of xDirChoices) {
    for (const yDir of yDirChoices) {
      const magnitude = GAME_PARAMS.jumpSpikePower * (Math.abs(xDir) + 1);
      const simVx = (contactPoint.x < netCenterX ? magnitude : -magnitude) * GAME_PARAMS.ballSpeedMultiplier;
      const simVy = Math.abs(contactPoint.vy) * yDir * GAME_PARAMS.jumpSpikeUpMultiplier * GAME_PARAMS.ballSpeedMultiplier;

      const result = simulatePostHit(contactPoint.x, contactPoint.y, simVx, simVy, netRect);
      const landingX = result.x;

      // 自殺球直接淘汰，不列入考慮
      const selfDestruct = isLeftSide ? landingX < netCenterX : landingX > netCenterX;
      if (selfDestruct) continue;

      // 估計對手要走多遠、來不來得及：對手目前位置到預測落點的距離，
      // 除以「一般移動速度」（不套用 AI 專屬的追球加速倍率，這樣才是公平地站在對手角度算，
      // 不會因為套用了 AI 自己的加速倍率而高估對手的反應能力，導致 AI 反而不敢打刁鑽角度）。
      // margin 是正數，代表就算對手看到球立刻起跑，也還差這麼多格畫面才追得到；
      // 數字越大，代表這球對對手來說越難救。
      const opponentCenterX = opponent.x + opponent.width / 2;
      const distanceNeeded = Math.abs(landingX - opponentCenterX);
      const framesNeeded = distanceNeeded / GAME_PARAMS.playerSpeed;
      const margin = framesNeeded - result.steps;

      const candidate = { xDir, yDir, landingX, steps: result.steps, margin, path: result.path };
      if (!best || candidate.margin > best.margin) best = candidate;
    }
  }
  return best;
}

// ---------- AI ----------
class AIPlayer extends Pikachu {
  constructor(x, y, side) {
    super(x, y, side);
    // 本次跳躍是否會殺球：跳起的當下就依 aiSpikeChance 機率決定一次，
    // 不是每一格畫面都重骰（不然骰個幾格畫面下來幾乎一定會中）。
    this.willSpike = false;
    // 這一次殺球要用哪一組方向鍵組合出手（由 chooseBestSpikeDirection 決定），
    // 預設先給原本「前+下」的固定重扣，避免還沒算過的第一格畫面沒有值可用。
    this.spikeXDir = 1;
    this.spikeYDir = 1;
    // 這次挑中的打法模擬出來的完整路徑點陣列，只給除錯畫面畫「打法路徑」用，跟遊戲邏輯無關
    this.spikePlannedPath = null;

    // ---- 原版特有的「膽量值 / 待命站位」個性化參數 ----
    // computerBoldness：0~4 隨機值，每一球開始前重骰一次（見 rerollComputerBoldness）。
    // 數字越大，AI 個性越大膽：站位判斷容錯越大（比較不龜毛）、越早跳起來準備接球、
    // 但飛撲門檻也跟著變高（沒事不亂撲），模擬原版每球「賭性」不太一樣的手感。
    this.computerBoldness = Math.floor(Math.random() * 5);
    // computerWhereToStandBy：0 = 待命時站在自己半場正中央，1 = 待命時站在靠近球網處。
    // 兩種待命位置會在特定情況下用機率隨機切換（見 makeDecision 內的重骰邏輯），
    // 不會每次都乖乖站在同一個位置等球，增加站位的不可預測性。
    this.computerWhereToStandBy = 0;
  }

  // 每一球開始前呼叫一次：重骰這一球要用的「膽量值」，模擬原版每球開場
  // 都重新 rand() % 5 一次的做法（見 physics.js 的 initializeForNewRound）。
  rerollComputerBoldness() {
    this.computerBoldness = Math.floor(Math.random() * 5);
  }

  // 判斷「如果我現在跳下去，這一整段跳躍過程（起跳到落地）有沒有哪一格畫面真的會碰到球」。
  // 跟原本「只看跳到最高點那一刻」的單點判斷不同：這裡完整模擬跳躍中每一格畫面的垂直位置
  // （公式跟 Pikachu.update() 的跳躍重力完全一致），同時假設 AI 會持續往預測站位（targetX）移動
  // （水平速度上限是 chaseSpeed，跟平常走位邏輯一致），再用跟 spikeRect getter 相同的公式
  // 算出每一格畫面的殺球判定框，逐格跟球的預測路徑（predictedFullPath）比對有沒有重疊。
  // 只要整段跳躍完全沒有任何一格畫面碰得到球，就回傳 -1——代表「這球用跳的攔不到」，
  // 這種情況就不該跳，跳了也是白跳（原地起跳、球從旁邊飛過），該做的是繼續走位或放棄這球。
  // 有碰到球的話，回傳「第幾格畫面碰到」（>=0），方便呼叫端查出當時球的位置/垂直速度，
  // 進一步模擬「打這一下之後，球最後會落在哪」（見 willHitSelfDestruct）。
  canReachBallByJumping(targetX, chaseSpeed, predictedFullPath) {
    const touchY = GROUND_Y - this.height;
    let simY = touchY;
    let simVy = GAME_PARAMS.jumpVelocity;
    let simX = this.x;
    const gravity = GAME_PARAMS.gravity;
    const w = GAME_PARAMS.hitboxWidthJump || this.width;
    const h = GAME_PARAMS.hitboxHeight || this.height;
    const extraUp = GAME_PARAMS.spikeHitboxExtra || 0;
    const extraForward = GAME_PARAMS.spikeHitboxForward || 0;
    const bw = GAME_PARAMS.ballWidth || 24;
    const bh = GAME_PARAMS.ballHeight || 24;
    const maxFrames = predictedFullPath.length - 1;

    for (let t = 0; t <= maxFrames; t++) {
      // 垂直：跳躍物理，跟 Pikachu.update() 完全同一套離散公式
      const futureY = simY + simVy;
      if (futureY < touchY) {
        simY = futureY;
        simVy += gravity;
      } else {
        // 落地，跳躍結束，之後的畫面已經不是「跳躍中」，不用再模擬
        break;
      }

      // 水平：假設持續往預測站位移動，速度上限跟目前使用的追球速度一致
      const dx = targetX - simX;
      if (Math.abs(dx) > chaseSpeed) simX += Math.sign(dx) * chaseSpeed;
      else simX = targetX;

      // 用跟 spikeRect getter 相同的公式，算出這一格畫面（模擬出來的 simX/simY）的殺球判定框
      let rx = this.side === "left" ? simX + (this.width - w) : simX;
      let rw = w;
      if (extraForward) {
        if (this.side === "left") rw += extraForward;
        else { rx -= extraForward; rw += extraForward; }
      }
      const ry = simY + (this.height - h) - extraUp;
      const rh = h + extraUp;

      const ballPt = predictedFullPath[t];
      if (!ballPt) break;
      const bx = ballPt.x - bw / 2, by = ballPt.y - bh / 2;

      if (rectsOverlap({ x: rx, y: ry, w: rw, h: rh }, { x: bx, y: by, w: bw, h: bh })) {
        return t;
      }
    }
    return -1;
  }

  makeDecision(ball, netRect, opponent) {
    try {
      // 移動判斷都加一個「容許誤差」(等於一步移動速度)：
      // 原本用 < / > 直接跟目標值比較，當目標值剛好卡在兩個像素中間、
      // 或球的 x 剛好貼著 AI 的 x 附近時，AI 每一格畫面都會左右各移動一次，
      // 變成肉眼可見的異常抖動。改成「差距大於一步才移動」就會穩定停住。
      // 膽量值越大，站位容錯也跟著放寬一點：不會每一格畫面都斤斤計較要精準站在
      // 目標點正下方，個性上比較大剌剌（對照原版「站位判斷用 computerBoldness+8」）。
      const tolerance = GAME_PARAMS.playerSpeed + this.computerBoldness * 1.5;
      const halfWidth = SCREEN_WIDTH / 2;
      // 這套決策邏輯原本是寫死給左側 AI 用的，現在改成依 this.side 判斷，
      // 這樣同一套 makeDecision 也能給右側（玩家 AI 託管）使用，達成「AI 對 AI 互打」。
      const isLeft = this.side === "left";
      const nearNetLimit = 50; // 站位不會硬走到貼著網子，留一點緩衝（跟原本左側數值一致）
      const zoneMinX = isLeft ? 0 : halfWidth + nearNetLimit;
      const zoneMaxX = isLeft ? halfWidth - nearNetLimit : SCREEN_WIDTH;
      // 待命站位有兩種，依 computerWhereToStandBy 切換（跟原版一樣）：
      // 0 = 站在自己半場正中央（比較保守、涵蓋範圍平均）；
      // 1 = 站在靠近球網處（比較積極搶攻，但後場容易空出來）。
      const readyXMidCourt = isLeft
        ? (halfWidth / 2 - this.width / 2)                    // 左側：己方（左半場）中央
        : (halfWidth + halfWidth / 2 - this.width / 2);        // 右側：己方（右半場）中央
      const readyXNearNet = isLeft
        ? (halfWidth - nearNetLimit - this.width)              // 左側：貼近球網（留一點緩衝）
        : (halfWidth + nearNetLimit);                          // 右側：貼近球網（留一點緩衝）
      const readyX = this.computerWhereToStandBy === 1 ? readyXNearNet : readyXMidCourt;

      // ---- 提前算好球的路徑 ----
      // 球現在人是不是已經在自己這一側半場（不管方向，先算出來，下面判斷追球/回防都會用到）。
      const ballOnMySide = isLeft ? (ball.x < halfWidth) : (ball.x >= halfWidth);

      // 原本這裡是用「球的水平速度正負號」判斷球是不是正朝這一側飛過來（incoming），
      // 但發球那一瞬間球是直直往下掉、水平速度剛好是 0（不偏左也不偏右），
      // 導致左右兩邊都判定成「球沒有朝我這邊來」，於是站在預備位置一動也不動、
      // 完全不追蹤發球的實際落點，等球快掉到地上才臨時反應，常常來不及接——
      // 這就是「AI 自己發球卻沒接好掉下去」的根本原因。
      // 改成參考原版 letComputerDecideUserInput 的做法：不看方向，每一格畫面都先算出球的
      // 預測落點，只要「預測落點會落在自己這一側」或「球現在人已經在自己這一側」，
      // 就視為需要追蹤卡位；只有球明確在對面、預測也會落在對面時，才回預備位置等待。
      let targetX;
      let predictedSteps = null; // 預測出的球「還要幾格畫面才會落地」，用來判斷走路來不來得及
      let predictedFullPath = null; // 球「每一格畫面」的完整預測路徑，用來精準抓起跳時機（不看球現在位置）
      let willTrackBall = false;

      if (GAME_PARAMS.aiPredictionEnabled) {
        const predicted = predictBallTrajectory(ball, netRect);
        const landingOnMySide = isLeft ? predicted.x < halfWidth : predicted.x >= halfWidth;
        willTrackBall = ballOnMySide || landingOnMySide;

        if (willTrackBall) {
          // 球剛從「不用追」變成「要追」的那一瞬間才重新骰一次「預測誤差」，
          // 同一輪來球全程沿用同一個誤差值，避免每一格畫面都重骰誤差，
          // 導致 AI 明明在追同一顆球、站位卻肉眼可見地一直抖動。
          if (!this._wasTrackingBall) {
            const accuracy = Math.max(0, Math.min(100, GAME_PARAMS.aiPredictionAccuracy));
            const maxErrorPx = 90; // 準確度 0% 時，預測落點最多可能偏差的像素數
            this._predictionErrorPx = (Math.random() * 2 - 1) * maxErrorPx * (1 - accuracy / 100);
          }
          this._lastPredictedPath = predicted.path; // 存起來供除錯畫面畫出預測軌跡虛線
          predictedSteps = predicted.steps;
          predictedFullPath = predicted.fullPath;
          // predicted.x 是「球中心」的預測落點，AI 的碰撞箱又是在精靈寬度(this.width)裡置中，
          // 所以要對齊兩者的中心，這裡要扣掉的是 AI 自己的半身寬(this.width/2)，
          // 而不是球的半徑(ball.width/2)，不然兩邊中心會系統性地偏掉一段距離。
          targetX = predicted.x - this.width / 2 + this._predictionErrorPx;
          // 預測落點不可能真的落在球網另一側，超出己方半場的部分夾回半場邊界，
          // 避免 AI 想「穿越球網」卡位卡到一半卡住不動。
          targetX = Math.max(zoneMinX, Math.min(targetX, zoneMaxX));
        } else {
          this._lastPredictedPath = null;
          targetX = readyX;
        }
      } else if (ballOnMySide) {
        // 關閉預測功能時，退回原本「只看球現在位置」的即時反應行為（同樣要對齊中心）
        this._lastPredictedPath = null;
        targetX = ball.x + ball.width / 2 - this.width / 2;
      } else {
        this._lastPredictedPath = null;
        targetX = readyX;
      }
      this._wasTrackingBall = willTrackBall;

      // AI 追預測落點時，腳程比一般移動（playerSpeed）快一點（aiChaseSpeedMultiplier），
      // 用來補「算得再準、也要先起跑才追得到」這段先天的反應落差；
      // 回防備位置時仍用一般速度，不會整體變成無腦加速。
      const chaseSpeed = (willTrackBall && GAME_PARAMS.aiPredictionEnabled)
        ? GAME_PARAMS.playerSpeed * (GAME_PARAMS.aiChaseSpeedMultiplier || 1)
        : GAME_PARAMS.playerSpeed;

      const dx = targetX - this.x;
      if (dx < -tolerance && this.x > zoneMinX) {
        this.move("left", netRect, chaseSpeed);
      } else if (dx > tolerance && this.x < zoneMaxX) {
        this.move("right", netRect, chaseSpeed);
      } else if (!this.diveMode && !this.isJumping) {
        this.state = "idle";
      }

      // 待命中（沒有在追球）、而且已經走到待命位置附近站定時，小機率重骰
      // 「待命站位模式」（中央／靠網），讓 AI 不會每一球都站在完全一樣的地方等球，
      // 跟原版「rand() % 20 === 0 時重骰 computerWhereToStandBy」的做法一致。
      if (!willTrackBall && Math.abs(dx) <= tolerance && Math.random() < 1 / 20) {
        this.computerWhereToStandBy = Math.random() < 0.5 ? 0 : 1;
      }

      // 起跳／殺球／飛撲：現在改成完全依賴「預測路徑」來決定時機，不再看球現在實際飛到哪裡。
      // 做法：既然已經精準模擬出球每一格畫面會在哪，就完整模擬「如果我現在跳下去」整段跳躍
      // 過程中，殺球判定框會不會在某一格畫面真的碰到球——不是只看跳到最高點那一刻，
      // 這樣才能正確判斷「這球跳了也碰不到」的情況（例如玩家殺出又快又刁鑽的球，
      // AI 根本來不及卡到正確位置），碰不到就不跳，留在原地繼續走位，而不是白白跳一個空。
      // （只有開啟 aiPredictionEnabled 且正在追蹤這顆球時才能這樣算；
      // 沒開預測、或球不在追蹤範圍內時，沒有路徑可用，退回原本「看現在位置」的即時反應寫法。
      // ballOnMySide 已經在上面算好並沿用，這裡不用重複宣告。）
      if (ballOnMySide) {
        if (!this.isJumping) {
          if (predictedFullPath) {
            const contactTick = this.canReachBallByJumping(targetX, chaseSpeed, predictedFullPath);
            if (contactTick >= 0) {
              this.jump();
              // 原版特有的「瞄準弱點」邏輯：不是死板地固定用「前+下」硬扣，
              // 而是把左右鍵（力道加倍與否）跟上/放開/下鍵（高吊/平擊/重扣）的
              // 每一種組合都先在腦內模擬一次打出去的落點，再比對對手目前站的位置跟腳程，
              // 挑一個對手最沒把握救到的組合出手（同時已經排除掉會撞網自殺的組合）。
              const contactPoint = predictedFullPath[contactTick];
              const best = chooseBestSpikeDirection(contactPoint, netRect, opponent, this.side === "left");
              if (best) {
                this.willSpike = true;
                this.spikeXDir = best.xDir;
                this.spikeYDir = best.yDir;
                this.willSelfDestructIfSpike = false;
                // 存下這次挑中的打法完整模擬路徑，供除錯畫面畫出「AI 算出的打法路徑」
                this.spikePlannedPath = best.path;
              } else {
                // 找不到任何一種組合是安全的（例如剛好卡在網邊很尷尬的位置，怎麼打都會自殺），
                // 放棄這次強力殺球，人還是照跳（卡住位置），球碰到時會落到下面 updatePlaying()
                // 的一般碰球判定，用比較保守、原版的「弱擊球」公式把球安全地頂回去。
                this.willSpike = false;
                this.willSelfDestructIfSpike = true;
              }
            }
            // 否則：跳了也碰不到，就不跳，維持原本的走位邏輯（上面已經算好的 targetX 會讓
            // AI 自然而然往正確方向移動／後退卡位，不需要在這裡另外處理「後退」）
          } else if (ball.y < this.y && Math.abs(ball.x - this.x) < GAME_PARAMS.aiJumpTriggerDistance + this.computerBoldness * 8) {
            // 膽量值越大，這裡的觸發距離越寬鬆，等於「球還沒真的靠得很近就先跳起來卡位」，
            // 對應原版「boldness 越大跳得越勤」的個性設定。
            // 沒有預測路徑可用時的退路：退回原本看「球現在位置」的即時反應，
            // 這種情況沒有預測路徑可以模擬各種方向的落點，沒辦法挑弱點，維持原本固定的前+下重扣。
            this.jump();
            this.willSpike = Math.random() * 100 < GAME_PARAMS.aiSpikeChance;
            this.spikeXDir = 1;
            this.spikeYDir = 1;
          }
        }

        if (this.willSpike && rectsOverlap(this.spikeRect, ball.rect)) {
          // 原版的擊球方向（xDirection/yDirection）是玩家當下按住的方向鍵，
          // AI 沒有真的在「按鍵」，這裡改用 chooseBestSpikeDirection() 事先試打過
          // 各種方向組合、挑出來「對手最沒把握救到」的那一組（this.spikeXDir/spikeYDir），
          // 不再像過去那樣每次都寫死用「前+下」。
          resolveBallHit(ball, this, /* isPowerHit */ true, this.spikeXDir, this.spikeYDir);
          ball.addSparks();
          playSound(sounds.slam);
          this.willSpike = false;
        }

        if (!this.diveMode && !this.isJumping) {
          // 飛撲一樣改成完全用「走到預測落點需要幾格畫面」跟「球還剩幾格畫面會落地」比較，
          // 算出用走的鐵定來不及才飛撲搶救，不再額外看球現在的即時距離。
          let cannotWalkInTime = false;
          if (predictedSteps !== null) {
            const distanceNeeded = Math.abs(targetX - this.x);
            const framesNeeded = distanceNeeded / GAME_PARAMS.playerSpeed;
            cannotWalkInTime = framesNeeded > predictedSteps + 6; // 留一點安全邊際給起跳/反應時間
          } else {
            // 沒有預測路徑可用時的退路：退回原本看球現在距離的即時反應
            // 膽量值越大，這裡的門檻越高，等於「沒事不會亂飛撲」，對應原版
            // 「boldness 越大飛撲門檻(computerBoldness*5+PLAYER_LENGTH)越高、飛撲越少」的個性設定。
            cannotWalkInTime = Math.abs(ball.x - this.x) > GAME_PARAMS.aiDiveTriggerDistance + this.computerBoldness * 10;
          }

          if (cannotWalkInTime) {
            // 撲的方向看「要去的地方」（預測落點）而不是球現在的位置，
            // 這樣提前判斷來不及時，才會撲對方向，而不是撲向球目前還沒到的位置。
            const direction = targetX < this.x ? "left" : "right";
            this.dive(direction, netRect);
          }
        }
      }
    } catch (e) {
      console.error("AI Error:", e);
    }
  }
}

// ---------- 擊球公式（照搬原版 physics.js 的 processCollisionBetweenBallAndPlayer） ----------
// 原版重點：擊球方向/力道不是「固定角度 + 隨機浮動」，而是由「球跟角色的水平距離」決定：
//   - 距離越遠，球被打飛的水平速度越快；球在角色左邊就往左飛，右邊就往右飛
//   - 垂直方向固定往上彈，且至少有 hitMinUpSpeed 的力道（原版 15）
//   - 只有「跳躍中 + 按下擊球鍵」才會觸發另一套固定的強力公式（殺球）：
//     水平速度固定是 jumpSpikePower 或它的兩倍（看有沒有按左右方向鍵加強），
//     垂直速度則是「打之前球速的絕對值 * 上下方向鍵 * 倍率」，
//     這也是為什麼原版要按著 down 鍵才能扣出又快又平的殺球、不按方向鍵殺球會變成水平速度較弱的球。
// player 參數需要有 .rect（碰撞箱）可用來取得跟球比較用的中心 x 座標。
function resolveBallHit(ball, player, isPowerHit, userInputXDirection, userInputYDirection) {
  const playerRect = player.rect;
  const playerCenterX = playerRect.x + playerRect.w / 2;
  const ballCenterX = ball.x + ball.width / 2;

  if (ballCenterX < playerCenterX) {
    ball.vx = -Math.floor(Math.abs(ballCenterX - playerCenterX) / GAME_PARAMS.hitXDivisor);
  } else if (ballCenterX > playerCenterX) {
    ball.vx = Math.floor(Math.abs(ballCenterX - playerCenterX) / GAME_PARAMS.hitXDivisor);
  }
  // 水平速度剛好算出 0（球幾乎正對角色中心）時，原版會隨機給 -1 / 0 / 1，避免球直上直下卡住不動
  if (ball.vx === 0) {
    ball.vx = Math.floor(Math.random() * 3) - 1;
  }

  const ballAbsVY = Math.abs(ball.vy);
  ball.vy = -ballAbsVY;
  if (ballAbsVY < GAME_PARAMS.hitMinUpSpeed) {
    ball.vy = -GAME_PARAMS.hitMinUpSpeed;
  }

  if (isPowerHit) {
    const netCenterX = SCREEN_WIDTH / 2;
    const magnitude = GAME_PARAMS.jumpSpikePower * (Math.abs(userInputXDirection) + 1);
    ball.vx = ballCenterX < netCenterX ? magnitude : -magnitude;
    ball.vy = Math.abs(ball.vy) * userInputYDirection * GAME_PARAMS.jumpSpikeUpMultiplier;
  }

  // 整體球速倍率（跟原本設定面板的 ballSpeedMultiplier 意義相同，方便您整體調快/調慢）
  ball.vx *= GAME_PARAMS.ballSpeedMultiplier;
  ball.vy *= GAME_PARAMS.ballSpeedMultiplier;

  return isPowerHit;
}

// ---------- 排球 ----------
class Volleyball {
  constructor() {
    this.width = GAME_PARAMS.ballWidth;
    this.height = GAME_PARAMS.ballHeight;
    this.x = SCREEN_WIDTH / 2 - this.width / 2;
    this.y = SCREEN_HEIGHT / 2 - this.height / 2;
    this.vx = 0;
    this.vy = 0;
    this.sparks = [];
    this.resetTimer = 0;
    // 球的動畫幀（大小不變，只是輪流換圖）：ballAnimTimer 每次 update 累加，
    // 每隔 BALL_ANIM_FRAME_DURATION 個 tick 就切到下一張圖，5 張圖循環播放。
    this.ballAnimTimer = 0;
    this.ballAnimFrame = 0;
  }

  get rect() {
    return { x: this.x, y: this.y, w: this.width, h: this.height };
  }

  // netRect：球網的碰撞矩形（Net.rect），改成跟原版一樣，球網碰撞判定是「這一步移動的一部分」，
  // 不是移動完之後才另外檢查（見下方函式內部順序，完全對照原版 FUN_00402dc0 的執行順序）。
  update(netRect) {
    if (this.resetTimer > 0) {
      this.resetTimer -= 1;
      return;
    }

    const restitution = GAME_PARAMS.ballBounceRestitution;

    // 1) 水平邊界：先「預測」移動後的位置會不會出界，出界就直接反彈水平速度
    //    （原版是判斷完就反彈，本身位置還沒真的移動過去，所以球不會真的跑出邊界外）
    const futureX = this.x + this.vx;
    if (futureX < 0 || futureX > SCREEN_WIDTH - this.width) {
      this.vx = -this.vx * restitution;
    }

    // 2) 上邊界：原版不是「反彈」，而是直接把垂直速度重設成 1（緩緩開始往下掉），
    //    這是原始遊戲機器碼裡的實際行為，照搬過來
    const futureYForCeiling = this.y + this.vy;
    if (futureYForCeiling < 0) {
      this.vy = 1;
    }

    // 3) 球網碰撞：分成「打到頂端圓帽」（垂直反彈）跟「打到側面」（水平反彈）兩種情況，
    //    碰撞判定用的半寬是 netCollisionHalfWidth（比畫面上看到的細網柱寬很多），
    //    這是原版判定會讓球感覺「打到網附近就會被擋下來」而不是要瞄得很準才會碰到的原因。
    if (netRect) {
      const netCenterX = netRect.x + netRect.w / 2;
      const ballCenterX = this.x + this.width / 2;
      const netTopY = netRect.y; // 網柱最頂端
      const netCapBottomY = netRect.y + GAME_PARAMS.netTopCapHeight; // 頂端圓帽跟側面的分界

      if (Math.abs(ballCenterX - netCenterX) < GAME_PARAMS.netCollisionHalfWidth && this.y > netTopY) {
        if (this.y <= netCapBottomY) {
          // 打到頂端圓帽：只有正在往下掉的時候才會被彈回去（原版邏輯，避免球往上飛過網頂時被誤判）
          if (this.vy > 0) {
            this.vy = -this.vy * restitution;
          }
        } else {
          // 打到網子側面：往左飛的球被推回左邊，往右飛的球被推回右邊
          if (this.x < netCenterX) {
            this.vx = -Math.abs(this.vx) * restitution;
          } else {
            this.vx = Math.abs(this.vx) * restitution;
          }
        }
      }
    }

    // 4) 地板：這一步移動完之後才判斷有沒有觸地，觸地就吸附在地面高度、垂直速度反彈
    //    （原版落地當下這個動作就算「這一球結束」，Game.updatePlaying() 裡緊接著的
    //    得分判定會抓到 y+height >= GROUND_Y 這個狀態來計分，跟原本的流程相容）
    const futureY = this.y + this.vy;
    if (futureY + this.height >= GROUND_Y) {
      this.vy = -this.vy * restitution;
      this.y = GROUND_Y - this.height;
    } else {
      this.y = futureY;
      this.x = this.x + this.vx;
      this.vy += GAME_PARAMS.ballGravity;
    }

    this.sparks = this.sparks.filter(s => s.update());

    // 推進球的動畫幀（固定播放速度，跟球飛多快無關，單純輪流換圖）
    this.ballAnimTimer++;
    if (this.ballAnimTimer >= BALL_ANIM_FRAME_DURATION) {
      this.ballAnimTimer = 0;
      this.ballAnimFrame = (this.ballAnimFrame + 1) % 5;
    }
  }

  draw(ctx) {
    if (assetsReady) {
      const frameImg = images.ballFrames[this.ballAnimFrame];
      // 大小永遠用 this.width / this.height（跟球本身邏輯尺寸一致），只換圖不換大小
      ctx.drawImage(frameImg, this.x, this.y, this.width, this.height);
    }
    this.sparks.forEach(s => s.draw(ctx));
  }

  addSparks() {
    for (let i = 0; i < 10; i++) {
      this.sparks.push(new Spark(this.x + this.width / 2, this.y + this.height));
    }
  }

  resetPosition(side) {
    this.width = GAME_PARAMS.ballWidth;
    this.height = GAME_PARAMS.ballHeight;
    this.y = 0;
    // 每次重新發球（不管是得分後換邊發球，還是遊戲一開始）都先把上一球殘留、
    // 還沒淡出完的擊球火花清掉，不要讓它們拖到下一球才消失
    this.sparks = [];
    const centerX = SCREEN_WIDTH / 2;
    if (side === "left") {
      // 固定發球位置：以畫面正中央為基準，往左側偏移 serveOffsetX
      this.x = Math.max(0, Math.min(centerX - GAME_PARAMS.serveOffsetX - this.width / 2, SCREEN_WIDTH - this.width));
    } else if (side === "right") {
      // 左右鏡射：往右側偏移相同距離
      this.x = Math.max(0, Math.min(centerX + GAME_PARAMS.serveOffsetX - this.width / 2, SCREEN_WIDTH - this.width));
    } else {
      this.x = centerX - this.width / 2;
      this.y = SCREEN_HEIGHT / 2 - this.height / 2;
    }
    this.vx = 0; // 沒有水平初速，直直落下
    this.vy = 0; // 靜止開始，靠重力自然加速掉落
  }

  startResetTimer() {
    this.resetTimer = GAME_PARAMS.serveDropDelay;
  }
}

// ---------- 球網 ----------
class Net {
  constructor() {
    this.w = GAME_PARAMS.netWidth;
    this.h = GAME_PARAMS.netHeight;
    this.x = SCREEN_WIDTH / 2 - this.w / 2;
    this.y = GROUND_Y - this.h;
  }
  get rect() {
    return { x: this.x, y: this.y, w: this.w, h: this.h };
  }
  draw(ctx) {
    if (assetsReady) {
      ctx.drawImage(images.stick, this.x, this.y, this.w, this.h);
    } else {
      ctx.fillStyle = "#8b5a2b";
      ctx.fillRect(this.x, this.y, this.w, this.h);
    }
  }
}

// ---------- 工具函式 ----------
function rectsOverlap(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

// ---------- 輸入處理 ----------
const keys = {};
window.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space", "Enter"].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener("keyup", e => {
  keys[e.code] = false;
});
canvas.addEventListener("pointerdown", () => {
  keys["Enter"] = true;
  setTimeout(() => { keys["Enter"] = false; }, 100);
  // 手機上直接在這次觸控的呼叫堆疊裡就把「開始遊戲／重新開始」處理掉，
  // 不要等到下一個 rAF 影格才由 updateMenu()/updateGameOver() 讀取 keys.Enter，
  // 這樣裡面呼叫的 sounds.bgm.play() 才確定是在使用者手勢的同一個呼叫堆疊裡，
  // 避免多等這一格造成部分手機瀏覽器/WebView 認定「已經不算使用者手勢了」。
  //
  // 線上對戰 Guest：不能直接本地 reset()（狀態機由 Host 主導，本地改了下一格也會被
  // Host 傳來的快照蓋掉），改成送出「重開請求」給 Host，由 Host 執行 reset 後同步回來。
  if (window.NetPlay && NetPlay.role === "guest" && NetPlay.connected) {
    if (game && game.state === GameState.GAME_OVER) {
      NetPlay.requestRestart();
    }
    return;
  }
  if (game && game.state === GameState.MENU) {
    game.reset();
    game.state = GameState.PLAYING;
    game.enterGame();
  } else if (game && game.state === GameState.GAME_OVER) {
    game.reset();
    game.state = GameState.PLAYING;
    game.enterGame();
  }
});

// ---------- 遊戲狀態機 ----------
// ============================================================
// 線上對戰模組（NetPlay）：純手動複製貼上 WebRTC signaling，不需要任何伺服器。
// Host（建房間者＝左側角色）跑完整物理當「權威」，每格模擬完把完整狀態快照送給 Guest；
// Guest（加入者＝右側角色）不跑物理，只送出自己的按鍵狀態、並直接依快照畫面。
// ============================================================
const NetPlay = (() => {
  const RTC_CONFIG = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  };

  let pc = null;
  let dataChannel = null;
  let role = null; // "host" | "guest" | null
  let connected = false;
  const remoteKeys = {}; // Host 用：儲存 Guest 傳來的最新按鍵狀態
  let latestSnapshot = null; // Guest 用：Host 傳來的最新完整狀態快照

  function setStatus(text, kind) {
    const el = document.getElementById("onlineStatus");
    if (!el) return;
    el.textContent = text;
    el.className = kind ? kind : "";
  }

  // ---- 連線碼壓縮：SDP 內容重複樣板很多（a=candidate、generation 0 network-cost 999 等），
  // 用瀏覽器內建的 CompressionStream 做 gzip，再轉成 Base64 文字，通常可縮短 50~70% 長度，
  // 方便用 LINE / 訊息 App 傳遞。若瀏覽器不支援 CompressionStream（極少數舊瀏覽器），
  // 自動退回原本的純文字 JSON，兩端各自獨立判斷，不會互相卡住。
  const COMPRESSED_PREFIX = "PVC1:"; // 用來標記「這段是壓縮過的連線碼」，解碼時用來判斷格式
  const hasCompression = typeof CompressionStream !== "undefined" && typeof DecompressionStream !== "undefined";

  async function compressText(text) {
    if (!hasCompression) return text; // 不支援就直接回傳原文字（未壓縮）
    const bytes = new TextEncoder().encode(text);
    const cs = new CompressionStream("gzip");
    const writer = cs.writable.getWriter();
    writer.write(bytes);
    writer.close();
    const compressed = await new Response(cs.readable).arrayBuffer();
    let binary = "";
    const arr = new Uint8Array(compressed);
    for (let i = 0; i < arr.length; i++) binary += String.fromCharCode(arr[i]);
    return COMPRESSED_PREFIX + btoa(binary);
  }

  async function decompressText(text) {
    const trimmed = text.trim();
    if (!trimmed.startsWith(COMPRESSED_PREFIX)) return trimmed; // 沒有標記，當成未壓縮的原文字處理
    if (!hasCompression) throw new Error("此瀏覽器不支援解壓縮連線碼，請換一個較新的瀏覽器");
    const b64 = trimmed.slice(COMPRESSED_PREFIX.length);
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const ds = new DecompressionStream("gzip");
    const writer = ds.writable.getWriter();
    writer.write(bytes);
    writer.close();
    const decompressed = await new Response(ds.readable).arrayBuffer();
    return new TextDecoder().decode(decompressed);
  }

  function updateOnlineBtnVisual() {
    const btn = document.getElementById("onlineBtn");
    if (btn) btn.classList.toggle("connected", connected);
  }

  function resetPeer() {
    if (dataChannel) { try { dataChannel.close(); } catch (e) {} }
    if (pc) { try { pc.close(); } catch (e) {} }
    pc = null;
    dataChannel = null;
    connected = false;
    for (const k in remoteKeys) delete remoteKeys[k];
    latestSnapshot = null;
    updateOnlineBtnVisual();
  }

  function setupDataChannelEvents(dc) {
    dc.onopen = () => {
      connected = true;
      setStatus(role === "host" ? "✅ 已連線！你是左側角色" : "✅ 已連線！你是右側角色", "ok");
      updateOnlineBtnVisual();
      // 連線成功後，兩邊都自動從選單進入遊戲，確保雙方同時開始
      if (role === "host" && window.game) {
        window.game.reset();
        window.game.state = GameState.PLAYING;
        window.game.enterGame();
      }
      const panel = document.getElementById("onlinePanel");
      if (panel) panel.style.display = "none";
    };
    dc.onclose = () => {
      connected = false;
      setStatus("連線已中斷", "err");
      updateOnlineBtnVisual();
    };
    dc.onerror = () => {
      setStatus("連線發生錯誤", "err");
    };
    dc.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        if (msg.t === "keys" && role === "host") {
          Object.assign(remoteKeys, msg.k);
        } else if (msg.t === "snap" && role === "guest") {
          latestSnapshot = msg.s;
        } else if (msg.t === "restartReq" && role === "host") {
          // Guest 在結束畫面按了 Enter，請求重開一局；Host 是狀態機的唯一權威，收到後才真的執行 reset
          if (window.game && window.game.state === GameState.GAME_OVER) {
            window.game.reset();
            window.game.state = GameState.PLAYING;
            window.game.enterGame();
          }
        }
      } catch (e) { /* 忽略解析失敗的訊息 */ }
    };
  }

  async function hostCreateOffer() {
    resetPeer();
    role = "host";
    pc = new RTCPeerConnection(RTC_CONFIG);
    dataChannel = pc.createDataChannel("game", { ordered: false, maxRetransmits: 0 });
    setupDataChannelEvents(dataChannel);

    const offerTextEl = document.getElementById("hostOfferText");
    pc.onicecandidate = () => {}; // 使用 onicegatheringstatechange 統一等收集完成
    pc.onicegatheringstatechange = () => {
      if (pc.iceGatheringState === "complete" && offerTextEl) {
        compressText(JSON.stringify(pc.localDescription)).then(txt => {
          offerTextEl.value = txt;
        });
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    setStatus("已產生連線碼，請複製傳給對方…", null);
  }

  async function hostConnectWithAnswer(answerText) {
    if (!pc) { setStatus("請先產生連線碼", "err"); return; }
    try {
      const raw = await decompressText(answerText);
      const answer = JSON.parse(raw.trim());
      await pc.setRemoteDescription(answer);
      setStatus("連線中…", null);
    } catch (e) {
      setStatus("連線碼格式錯誤，請確認完整複製貼上", "err");
    }
  }

  async function guestCreateAnswer(offerText) {
    resetPeer();
    role = "guest";
    pc = new RTCPeerConnection(RTC_CONFIG);
    pc.ondatachannel = (event) => {
      dataChannel = event.channel;
      setupDataChannelEvents(dataChannel);
    };

    const answerTextEl = document.getElementById("guestAnswerText");
    pc.onicegatheringstatechange = () => {
      if (pc.iceGatheringState === "complete" && answerTextEl) {
        compressText(JSON.stringify(pc.localDescription)).then(txt => {
          answerTextEl.value = txt;
        });
      }
    };

    try {
      const raw = await decompressText(offerText);
      const offer = JSON.parse(raw.trim());
      await pc.setRemoteDescription(offer);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      setStatus("已產生回傳連線碼，請複製傳回給對方…", null);
    } catch (e) {
      setStatus("連線碼格式錯誤，請確認完整複製貼上", "err");
    }
  }

  // Guest 端：每一格畫面把自己的按鍵狀態送給 Host（只送遊戲會用到的幾個鍵，減少流量）
  let guestPrevEnter = false; // Guest 自己這端記錄「上一格是否按著 Enter」，用來偵測結束畫面的「剛按下」瞬間
  function sendLocalKeys(keySrc, gameState) {
    if (!dataChannel || dataChannel.readyState !== "open") return;
    const enterNow = !!(keySrc["Enter"] || keySrc["Space"]);
    const k = {
      ArrowLeft: !!keySrc["ArrowLeft"],
      ArrowRight: !!keySrc["ArrowRight"],
      ArrowUp: !!keySrc["ArrowUp"],
      ArrowDown: !!keySrc["ArrowDown"],
      Enter: enterNow
    };
    try { dataChannel.send(JSON.stringify({ t: "keys", k })); } catch (e) {}

    // 結束畫面時，Guest 按下 Enter（剛按下那一瞬間）要另外送一則「請求重開」訊息給 Host，
    // 因為遊戲狀態機完全由 Host 主導，Guest 不能自己 reset()，只能請 Host 代為執行。
    if (gameState === GameState.GAME_OVER && enterNow && !guestPrevEnter) {
      try { dataChannel.send(JSON.stringify({ t: "restartReq" })); } catch (e) {}
    }
    guestPrevEnter = enterNow;
  }

  // Host 端：把完整遊戲狀態（雙方角色、球、比分、狀態機）打包送給 Guest
  function sendSnapshot(game) {
    if (!dataChannel || dataChannel.readyState !== "open") return;
    const packEntity = (e) => ({
      x: e.x, y: e.y, state: e.state, frame: e.frame,
      hitAnimActive: e.hitAnimActive, hitAnimFrame: e.hitAnimFrame,
      diveMode: e.diveMode, flip: e.flip
    });
    const s = {
      gs: game.state,
      scoreLeft: game.scoreLeft,
      scoreRight: game.scoreRight,
      ai: packEntity(game.ai),
      player: packEntity(game.player),
      ball: {
        x: game.ball.x, y: game.ball.y,
        ballAnimFrame: game.ball.ballAnimFrame,
        resetTimer: game.ball.resetTimer,
        sparkCount: game.ball.sparks.length
      },
      gameWinnerSide: game.gameWinnerSide,
      winLoseFrame: game.winLoseFrame
    };
    try { dataChannel.send(JSON.stringify({ t: "snap", s })); } catch (e) {}
  }

  // Guest 端：把收到的最新快照套用到本機的 game 物件上，純粹用來畫面顯示，不影響任何判定邏輯
  function applyLatestSnapshotTo(game) {
    if (!latestSnapshot) return;
    const s = latestSnapshot;
    game.state = s.gs;
    game.scoreLeft = s.scoreLeft;
    game.scoreRight = s.scoreRight;
    game.gameWinnerSide = s.gameWinnerSide;
    game.winLoseFrame = s.winLoseFrame;
    Object.assign(game.ai, s.ai);
    Object.assign(game.player, s.player);
    game.ball.x = s.ball.x;
    game.ball.y = s.ball.y;
    game.ball.ballAnimFrame = s.ball.ballAnimFrame;
    game.ball.resetTimer = s.ball.resetTimer;
  }

  function disconnect() {
    role = null;
    resetPeer();
    setStatus("尚未連線", null);
  }

  // Guest 端主動請求 Host 重開一局（結束畫面按鈕/點擊螢幕都會呼叫這個）
  function requestRestart() {
    if (!dataChannel || dataChannel.readyState !== "open") return;
    try { dataChannel.send(JSON.stringify({ t: "restartReq" })); } catch (e) {}
  }

  return {
    get role() { return role; },
    get connected() { return connected; },
    remoteKeys,
    hostCreateOffer,
    hostConnectWithAnswer,
    guestCreateAnswer,
    sendLocalKeys,
    sendSnapshot,
    applyLatestSnapshotTo,
    requestRestart,
    disconnect
  };
})();
window.NetPlay = NetPlay;

const GameState = { MENU: 0, PLAYING: 1, GAME_OVER: 2 };

class Game {
  constructor() {
    this.state = GameState.MENU;
    this.menuIndex = 0;
    this.menuItems = ["開始遊戲"];
    this.reset();
    this.musicStarted = false;

    this.prevUp = false;
    this.prevDown = false;
    this.prevEnter = false;
    this.prevAction = false;

    this.actionHeld = { player: false };

    // 遊戲結束畫面用：贏家/輸家動畫播放進度，只播一次（不循環）
    this.gameWinnerSide = null;
    this.winLoseFrame = 0;
    this.winLoseTimer = 0;

    // 自動開新局用：進入 GAME_OVER 畫面後累計多少 tick，達到 autoRestartDelay 就自動重開一局
    this.gameOverTimer = 0;
  }

  // 依 serveOffsetX 算出「站在球正下方」所需的角色 x 座標：
  // 跟 Volleyball.resetPosition() 用同一個基準點（畫面中央 ± serveOffsetX），
  // 只是換算成角色（精靈）自己的寬度，讓角色中心對齊球中心。
  getHomeX(side) {
    const centerX = SCREEN_WIDTH / 2;
    const cx = side === "left" ? centerX - GAME_PARAMS.serveOffsetX : centerX + GAME_PARAMS.serveOffsetX;
    return Math.round(Math.max(0, Math.min(cx - SPRITE_W / 2, SCREEN_WIDTH - SPRITE_W)));
  }

  reset() {
    this.ai = new AIPlayer(this.getHomeX("left"), GROUND_Y - SPRITE_H, "left");
    // player 也改用 AIPlayer 類別（AIPlayer 只是在 Pikachu 上多加幾個 AI 決策用的欄位，
    // 沒有覆寫 move/jump/dive/update 等操作方法，所以鍵盤操作行為完全不受影響），
    // 這樣「AI 託管」開啟時才能直接呼叫 player.makeDecision() 讓右側也變成 AI 自動操作。
    this.player = new AIPlayer(this.getHomeX("right"), GROUND_Y - SPRITE_H, "right");
    this.ball = new Volleyball();
    // 開局第一球固定由左側（AI）發球，球在角色正上方停留 serveDropDelay 之後才開始掉落
    this.ball.resetPosition("left");
    this.ball.startResetTimer();
    this.net = new Net();
    this.scoreLeft = 0;
    this.scoreRight = 0;
  }

  // 每一場（得分之後、下一球開始前）呼叫：把兩邊角色都收回各自的發球位置（站在球正下方），
  // 並清掉跳躍/飛撲等狀態，避免上一球結束時卡在飛撲或半空中的姿勢。
  resetPlayerPositions() {
    const homeX = { left: this.getHomeX("left"), right: this.getHomeX("right") };
    [this.ai, this.player].forEach(entity => {
      entity.x = homeX[entity.side];
      entity.y = GROUND_Y - SPRITE_H;
      entity.vy = 0;
      entity.isJumping = false;
      entity.diveMode = false;
      entity.divingMovement = false;
      entity.diveTimer = 0;
      entity.state = "idle";
      entity.frame = 0;
      entity.animTimer = 0;
      entity.hitAnimActive = false;
      entity.hitAnimFrame = 0;
      entity.hitAnimTimer = 0;
    });
    this.ai.willSpike = false;
    this.player.willSpike = false;
    this.player.spikeArmed = false;

    // 每一球開始前重骰「膽量值」(computerBoldness)：跟原版一致，每一局/每一球
    // 都重新骰一次 0~4 的隨機值，讓 AI 的積極度（多快出手、跳多勤、飛撲多勤）
    // 每一球都有點不同，不會每次都用完全一樣的門檻值判斷，感覺更有變化、不死板。
    // （不管這一側目前是不是 AI 在控制都重骰，反正玩家自己操作時這個值用不到，無害。）
    this.ai.rerollComputerBoldness();
    this.player.rerollComputerBoldness();
  }

  // 進入遊戲（第一次開始／重新開始都會呼叫）：
  // 第一次進入時，要「先完整播放 pikachu.wav，播完才開始播放背景音樂」，
  // 兩者不能同時疊在一起播放；之後背景音樂會一直循環播放，
  // 所以之後每次重新進入遊戲只需要再播一次 pikachu.wav 提示音，不用重新啟動背景音樂。
  enterGame() {
    if (!this.musicStarted) {
      this.musicStarted = true;
      playPikachuThenMusic();
    } else {
      playSound(sounds.pikachu);
    }
  }

  startMusic() {
    // 保留給舊呼叫點相容用，行為等同 enterGame()
    this.enterGame();
  }

  update() {
    // 線上對戰 Guest：整個狀態機（選單/遊戲中/結束畫面）完全由 Host 主導，
    // Guest 只負責持續送出按鍵、並套用 Host 傳回來的最新快照，不自己跑任何規則判定。
    if (window.NetPlay && NetPlay.role === "guest" && NetPlay.connected) {
      NetPlay.sendLocalKeys(keys, this.state);
      NetPlay.applyLatestSnapshotTo(this);
      return;
    }
    if (this.state === GameState.MENU) this.updateMenu();
    else if (this.state === GameState.PLAYING) this.updatePlaying();
    else if (this.state === GameState.GAME_OVER) this.updateGameOver();

    // Host：不管目前在哪個畫面（選單/遊戲中/結束），都持續把狀態快照送給 Guest，
    // 這樣 Guest 那邊也能同步看到選單、比分、結束畫面，而不是只有 PLAYING 中才同步。
    if (window.NetPlay && NetPlay.role === "host" && NetPlay.connected && this.state !== GameState.PLAYING) {
      NetPlay.sendSnapshot(this);
    }
  }

  updateMenu() {
    const upNow = !!keys["ArrowUp"];
    const downNow = !!keys["ArrowDown"];
    const enterNow = !!(keys["Enter"] || keys["Space"]);

    if (upNow && !this.prevUp) {
      this.menuIndex = (this.menuIndex - 1 + this.menuItems.length) % this.menuItems.length;
    }
    if (downNow && !this.prevDown) {
      this.menuIndex = (this.menuIndex + 1) % this.menuItems.length;
    }
    if (enterNow && !this.prevEnter) {
      if (this.menuItems[this.menuIndex] === "開始遊戲") {
        this.reset();
        this.state = GameState.PLAYING;
        this.enterGame();
      }
    }
    this.prevUp = upNow;
    this.prevDown = downNow;
    this.prevEnter = enterNow;
  }

  // 把「讀取一組按鍵狀態 -> 套用到某個角色」的邏輯抽成共用函式，
  // 這樣本地鍵盤操作、線上對戰時套用對方傳來的按鍵狀態，都能重複使用同一套判定，
  // 行為完全一致（原本這段邏輯只寫給 this.player 用）。
  // heldRef 是一個 {value:boolean} 物件，用來記錄「上一格是否按著action鍵」（跨影格保存用）。
  applyKeyControl(entity, keySrc, ball, netRect, heldRef) {
    if (keySrc["ArrowLeft"]) entity.move("left", netRect);
    else if (keySrc["ArrowRight"]) entity.move("right", netRect);
    else if (!entity.isJumping && !entity.diveMode) entity.state = "idle";

    if (keySrc["ArrowUp"]) entity.jump();

    const actionNow = !!(keySrc["Enter"] || keySrc["Space"]);
    if (actionNow && !heldRef.value) {
      if (entity.isJumping) {
        entity.spikeArmed = true;
      }
    }
    if (entity.spikeArmed && entity.isJumping && rectsOverlap(entity.spikeRect, ball.rect)) {
      const xDir = keySrc["ArrowLeft"] ? -1 : (keySrc["ArrowRight"] ? 1 : 0);
      const yDir = keySrc["ArrowUp"] ? -1 : (keySrc["ArrowDown"] ? 1 : 0);
      resolveBallHit(ball, entity, /* isPowerHit */ true, xDir, yDir);
      ball.addSparks();
      playSound(sounds.slam);
      entity.spikeArmed = false;
    }
    if (actionNow) {
      if (keySrc["ArrowLeft"]) entity.dive("left", netRect);
      else if (keySrc["ArrowRight"]) entity.dive("right", netRect);
    }
    heldRef.value = actionNow;
  }

  updatePlaying() {
    const p = this.player;
    const netRect = this.net.rect;

    // 得分後球停在原地等待掉落的期間（serveDropDelay），雙方都不能操控，
    // 等球真的開始動了才能移動／跳躍／殺球／飛撲
    const ballLocked = this.ball.resetTimer > 0;

    // AI 託管開關：開啟後右側玩家不再讀鍵盤，改成呼叫跟左側 AI 相同的 makeDecision()，
    // 等於「AI 對 AI 互打」，人類不用操作也能一直看下去。
    // 線上對戰時（無論 Host 或未連線）此開關功能維持原樣，只影響「右側非遠端玩家」的情況。
    const playerAITakeover = !!GAME_PARAMS.aiTakeoverEnabled;

    // 線上對戰 Host：右側改成讀取「Guest 傳來的按鍵狀態」，而不是本機鍵盤；
    // 左側（this.ai）則改成讀取 Host 本機鍵盤，取代原本的 AI makeDecision。
    const isNetHost = !!(window.NetPlay && NetPlay.role === "host" && NetPlay.connected);
    const rightKeySrc = isNetHost ? NetPlay.remoteKeys : keys;

    // actionHeld 用 {value:boolean} 的形式跨影格保存「上一格是否按著action鍵」，
    // this._rightHeldRef / this._leftHeldRef 是固定引用同一顆物件，跟 this.actionHeld.player 同步。
    this._rightHeldRef = this._rightHeldRef || { value: this.actionHeld.player };
    this._leftHeldRef = this._leftHeldRef || { value: false };
    this._rightHeldRef.value = this.actionHeld.player;

    // 玩家操作（右側角色）
    if (!ballLocked) {
      if (isNetHost) {
        this.applyKeyControl(p, rightKeySrc, this.ball, netRect, this._rightHeldRef);
        this.actionHeld.player = this._rightHeldRef.value;
      } else if (playerAITakeover) {
        // 右側交給 AI 自動操作（makeDecision 內部會自己處理移動／跳躍／殺球／飛撲）
        p.makeDecision(this.ball, netRect, this.ai);
        this.actionHeld.player = false;
      } else {
        this.applyKeyControl(p, keys, this.ball, netRect, this._rightHeldRef);
        this.actionHeld.player = this._rightHeldRef.value;
      }

      // 左側：線上對戰 Host 時改讀本機鍵盤（取代 AI），否則維持原本 AI 決策
      if (isNetHost) {
        this.applyKeyControl(this.ai, keys, this.ball, netRect, this._leftHeldRef);
      } else {
        this.ai.makeDecision(this.ball, netRect, p);
      }
    } else {
      if (!p.isJumping && !p.diveMode) p.state = "idle";
      if (isNetHost) {
        this.actionHeld.player = !!(rightKeySrc["Enter"] || rightKeySrc["Space"]);
      } else {
        this.actionHeld.player = playerAITakeover ? false : !!(keys["Enter"] || keys["Space"]);
      }
    }

    // 更新角色 / 球
    this.ai.update(this.ball);
    p.update(this.ball);
    // 球網碰撞判定已經照原版做法整合進 update() 內部（跟移動同一步處理），所以這裡直接把 netRect 傳進去
    this.ball.update(netRect);

    // 一般碰球（非飛撲、非跳躍殺球那一下）：原版無論站著或跳躍中，
    // 只要沒有同時按殺球鍵，一律用同一套弱擊球公式（見 resolveBallHit）
    if (!this.ai.diveMode && rectsOverlap(this.ball.rect, this.ai.rect)) {
      resolveBallHit(this.ball, this.ai, false, 0, 0);
      playSound(sounds.hit);
      // 在地上的一般碰球才播擊球動畫；跳躍中已經有專屬的跳躍圖，不疊加
      if (!this.ai.isJumping) this.ai.playHitAnim();
    }
    if (!p.diveMode && rectsOverlap(this.ball.rect, p.rect)) {
      resolveBallHit(this.ball, p, false, 0, 0);
      playSound(sounds.hit);
      if (!p.isJumping) p.playHitAnim();
    }

    // 得分判定
    if (this.ball.y + this.ball.height >= GROUND_Y) {
      let winnerSide;
      if (this.ball.x + this.ball.width / 2 < SCREEN_WIDTH / 2) {
        this.scoreRight += 1;
        winnerSide = "right";
      } else {
        this.scoreLeft += 1;
        winnerSide = "left";
      }

      // 雙方都先收回最後方起始位置，再由上一球的勝方發球，
      // 球固定從畫面中央鏡射出去的位置直直落下（沒有水平初速），位置與角色實際站位無關，可在設定面板調整
      this.resetPlayerPositions();
      this.ball.resetPosition(winnerSide);
      this.ball.startResetTimer();
      playSound(sounds.score);

      if (this.scoreLeft >= GAME_PARAMS.winScore || this.scoreRight >= GAME_PARAMS.winScore) {
        this.state = GameState.GAME_OVER;
        this.gameWinnerSide = winnerSide;
        this.winLoseFrame = 0;
        this.winLoseTimer = 0;
        this.gameOverTimer = 0;
        playSound(sounds.win);
      }
    }

    // Host：每一格模擬完成後，把權威狀態快照送給 Guest，讓對方畫面同步
    if (isNetHost) {
      NetPlay.sendSnapshot(this);
    }
  }

  updateGameOver() {
    // 贏家/輸家動畫：只播一次，播到最後一張（frame 4）就停住，不會循環重播
    this.winLoseTimer++;
    if (this.winLoseTimer >= GAME_PARAMS.winLoseAnimInterval) {
      this.winLoseTimer = 0;
      this.winLoseFrame = Math.min(this.winLoseFrame + 1, 4);
    }

    const enterNow = !!(keys["Enter"] || keys["Space"]);
    const escNow = !!keys["Escape"];
    if (enterNow && !this.prevEnter) {
      this.reset();
      this.state = GameState.PLAYING;
      this.enterGame();
    }
    if (escNow) {
      this.state = GameState.MENU;
    }
    this.prevEnter = enterNow;

    // 自動開新局：開關開著的話，遊戲結束畫面停留滿 autoRestartDelay（tick）就自動重開一局，
    // 不需要手動按 Enter，方便搭配「AI 託管」讓兩邊 AI 無限一直打下去。
    // 上面如果剛剛已經因為按 Enter 重開了（state 已經變回 PLAYING），這裡就不用再重複觸發一次。
    if (this.state === GameState.GAME_OVER) {
      if (GAME_PARAMS.autoRestartEnabled) {
        this.gameOverTimer++;
        if (this.gameOverTimer >= GAME_PARAMS.autoRestartDelay) {
          this.gameOverTimer = 0;
          this.reset();
          this.state = GameState.PLAYING;
          this.enterGame();
        }
      } else {
        this.gameOverTimer = 0;
      }
    }
  }

  draw() {
    if (this.state === GameState.MENU) this.drawMenu();
    else if (this.state === GameState.PLAYING) this.drawPlaying();
    else if (this.state === GameState.GAME_OVER) this.drawGameOver();
  }

  drawBackground() {
    if (assetsReady) {
      ctx.drawImage(images.background, 0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
    } else {
      ctx.fillStyle = "#4aa3df";
      ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
      ctx.fillStyle = "#e0c88a";
      const bandHeight = Math.max(GAME_PARAMS.groundHeight, 30);
      ctx.fillRect(0, SCREEN_HEIGHT - bandHeight, SCREEN_WIDTH, bandHeight);
      if (GAME_PARAMS.groundHeight > 0) {
        ctx.strokeStyle = "#b89b5e";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y);
        ctx.lineTo(SCREEN_WIDTH, GROUND_Y);
        ctx.stroke();
      }
    }
  }

  drawMenu() {
    // 開始畫面首圖：改用 main.png，不再套用遊戲內的沙灘背景
    if (assetsReady && images.mainScreen && images.mainScreen.naturalWidth) {
      ctx.drawImage(images.mainScreen, 0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
    } else {
      this.drawBackground();
    }

    // 「開始遊戲」改用 1p.png 圖片按鈕，不再顯示文字
    const startImg = images.startButton;
    if (assetsReady && startImg && startImg.naturalWidth) {
      const w = startImg.naturalWidth;
      const h = startImg.naturalHeight;
      ctx.drawImage(startImg, SCREEN_WIDTH / 2 - w / 2, 220, w, h);
    } else {
      // 圖片還沒載入完成時的備用文字，避免完全看不到按鈕在哪
      ctx.fillStyle = YELLOW;
      ctx.font = "28px Arial";
      ctx.textAlign = "center";
      ctx.fillText("開始遊戲", SCREEN_WIDTH / 2, 240);
    }
  }

  // 分數顯示：改用 no.png 這張數字雪碧圖（橫向 0~9，每格 32x32），
  // 不再用 canvas 文字＋外框描邊繪製，直接把對應數字的那一格圖片畫出來，
  // 風格由圖檔本身決定。抽成共用方法，遊戲進行中跟遊戲結束畫面都會呼叫，
  // 確保比分一直顯示、不會被隱藏。
  drawScore() {
    if (!assetsReady) return;
    const digitSize = GAME_PARAMS.scoreFontSize; // 每個數字圖示的顯示大小（寬高相同，正方形格子）
    const y = GAME_PARAMS.scoreY; // 數字圖示的頂端 y 座標
    drawScoreNumber(this.scoreLeft, 20, y, "left", digitSize);
    drawScoreNumber(this.scoreRight, SCREEN_WIDTH - 20, y, "right", digitSize);
  }

  drawPlaying() {
    this.drawBackground();
    this.ai.draw(ctx);
    this.player.draw(ctx);
    this.ball.draw(ctx);
    this.net.draw(ctx);

    this.drawScore();

    if (DEBUG_SHOW_HITBOX) this.drawDebugHitboxes();
    if (GAME_PARAMS.showBallPath) this.drawPredictedBallPath();
    if (GAME_PARAMS.showBallPath) this.drawSpikePlannedPath();
  }

  drawDebugHitboxes() {
    ctx.save();
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#4a90e2";
    const ar = this.ai.rect;
    ctx.strokeRect(ar.x, ar.y, ar.w, ar.h);
    ctx.strokeStyle = "#e2984a";
    const pr = this.player.rect;
    ctx.strokeRect(pr.x, pr.y, pr.w, pr.h);
    ctx.strokeStyle = "#e0507a";
    const br = this.ball.rect;
    ctx.strokeRect(br.x, br.y, br.w, br.h);
    ctx.strokeStyle = "#5cb85c";
    const nr = this.net.rect;
    ctx.strokeRect(nr.x, nr.y, nr.w, nr.h);

    // 跳躍殺球的加高判定範圍（虛線），方便邊調 spikeHitboxExtra 邊看效果
    ctx.setLineDash([4, 3]);
    ctx.strokeStyle = "#4a90e2";
    const asr = this.ai.spikeRect;
    ctx.strokeRect(asr.x, asr.y, asr.w, asr.h);
    ctx.strokeStyle = "#e2984a";
    const psr = this.player.spikeRect;
    ctx.strokeRect(psr.x, psr.y, psr.w, psr.h);
    ctx.setLineDash([]);

    // 只要 AI 曾經算過「這球殺下去會不會自殺」，就在牠頭上標出結果與挑選出的方向組合，
    // 方便邊玩邊確認「瞄準弱點」的邏輯有沒有正常運作
    if (this.ai.willSelfDestructIfSpike !== undefined) {
      ctx.font = "10px sans-serif";
      ctx.textAlign = "center";
      if (this.ai.willSelfDestructIfSpike) {
        ctx.fillStyle = "#ff4d4d";
        ctx.fillText("殺球會自殺→改保守", ar.x + ar.w / 2, ar.y - 6);
      } else {
        ctx.fillStyle = "#5cb85c";
        const yDirLabel = { "-1": "高吊", "0": "平擊", "1": "重扣" }[this.ai.spikeYDir];
        const xDirLabel = this.ai.spikeXDir === 0 ? "一般力道" : "加倍力道";
        ctx.fillText(`殺球：${yDirLabel}／${xDirLabel}`, ar.x + ar.w / 2, ar.y - 6);
      }
    }

    ctx.restore();
  }

  // 畫出 AI 這次挑選出的殺球打法，模擬出來「打出去之後」球會怎麼飛、最後落在哪
  // （chooseBestSpikeDirection() 試打過的那一組勝出組合）。
  // 用跟「來球預測路徑」（黃色）不同的顏色（洋紅色）畫，一眼就能分辨哪條是「來球」、哪條是「打法」。
  // 跟來球預測路徑共用同一個開關 GAME_PARAMS.showBallPath，打開「球的路徑顯示」就會兩條一起畫出來，
  // 不需要額外打開設定面板的碰撞箱顯示。
  drawSpikePlannedPath() {
    const path = this.ai.spikePlannedPath;
    if (!(path && path.length > 1)) return;
    ctx.save();
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = "#ff4dff";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
    ctx.setLineDash([]);
    // 打出去的起點（擊球瞬間）畫個小方塊，落點畫個小圓圈，方便分辨方向
    const first = path[0];
    ctx.fillStyle = "#ff4dff";
    ctx.fillRect(first.x - 3, first.y - 3, 6, 6);
    const last = path[path.length - 1];
    ctx.beginPath();
    ctx.arc(last.x, last.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // 畫出 AI 目前「提前算好」的預測球路徑（只在有來球、且預測功能開啟時才有資料）。
  // 獨立用 GAME_PARAMS.showBallPath 開關控制，跟 DEBUG_SHOW_HITBOX（碰撞箱顯示、開設定面板才會亮）分開，
  // 不管設定面板有沒有打開，只要這個開關是 on 就會一直畫出來。
  drawPredictedBallPath() {
    if (!(this.ai._lastPredictedPath && this.ai._lastPredictedPath.length > 1)) return;
    ctx.save();
    const path = this.ai._lastPredictedPath;
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = "#ffe14a";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
    ctx.setLineDash([]);
    // 預測落點畫個小圓圈標示出來
    const last = path[path.length - 1];
    ctx.fillStyle = "#ffe14a";
    ctx.beginPath();
    ctx.arc(last.x, last.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // 遊戲結束畫面用：把單一角色畫成贏家/輸家動畫的某一張圖，
  // 面向、腳底對齊地面的算法都跟平常站立姿勢一致（同一個 SPRITE_W/H 基準），
  // 圖片還沒載入完成時，直接退回該角色原本的站立姿勢，避免畫面空白。
  drawWinLoseSprite(entity, img, w, h) {
    if (!assetsReady || !img || !img.naturalWidth) {
      entity.draw(ctx);
      return;
    }
    const centerOffsetX = (SPRITE_W - w) / 2;
    const drawX = Math.round(entity.x + centerOffsetX);
    const drawY = Math.round(entity.y - (h - SPRITE_H));
    const shouldFlip = entity.side === "right";
    ctx.save();
    if (shouldFlip) {
      ctx.translate(drawX + w, drawY);
      ctx.scale(-1, 1);
      ctx.drawImage(img, 0, 0, w, h);
    } else {
      ctx.drawImage(img, drawX, drawY, w, h);
    }
    ctx.restore();
  }

  drawGameOver() {
    this.drawBackground();
    this.net.draw(ctx);

    const winnerIsLeft = this.gameWinnerSide === "left";
    const winnerEntity = winnerIsLeft ? this.ai : this.player;
    const loserEntity = winnerIsLeft ? this.player : this.ai;
    const winImg = images.winFrames[this.winLoseFrame];
    const loseImg = images.loseFrames[this.winLoseFrame];
    this.drawWinLoseSprite(winnerEntity, winImg, WIN_W, WIN_H);
    this.drawWinLoseSprite(loserEntity, loseImg, LOSE_W, LOSE_H);

    this.ball.draw(ctx);
    this.drawScore();
  }
}

game = new Game();
window.game = game; // 讓 NetPlay 模組（連線建立後自動開局用）能存取到目前的遊戲物件

/* ============================================================
   【設定面板】把 GAME_PARAMS_META 動態轉成可拖拉的滑桿 + 數字輸入框，
   並提供「複製目前參數」「套用貼上的參數」「還原預設值」三個功能。
   完全比照 skuld.html 的做法。
   ============================================================ */
(function(){
  function buildParamPanel(){
    const container = document.getElementById("paramSliders");
    if(!container) return;
    container.innerHTML = "";

    const metaByKey = {};
    GAME_PARAMS_META.forEach(function(meta){ metaByKey[meta[1]] = meta; });

    function buildRow(meta){
      const label = meta[0], key = meta[1], min = meta[2], max = meta[3], step = meta[4], type = meta[5];

      const row = document.createElement("div");
      row.className = "param-row";

      const top = document.createElement("div");
      top.className = "param-row-top";

      const labelEl = document.createElement("label");
      // label 格式是「中文說明(可能含空格) 參數代號」，參數代號一定是最後一個空格分隔的字，
      // 之前寫成 label.split(" ")[0] 是「只取第一個字」，遇到中文說明裡本身就有空格
      // （例如「AI 起跳觸發距離 aiJumpTriggerDistance」）就會被攔腰截斷成只剩「AI」。
      // 改成「去掉最後一個字，其餘原樣保留」才能正確留下完整的中文說明。
      const labelParts = label.split(" ");
      labelEl.textContent = labelParts.slice(0, -1).join(" ");
      labelEl.title = label;

      if(type === "bool"){
        // 開關型參數（目前用於音效/音樂開關）：渲染成 iOS 風格的切換開關
        labelEl.className = "param-toggle-label";
        labelEl.htmlFor = "param-bool-" + key;

        const toggleWrap = document.createElement("label");
        toggleWrap.className = "param-toggle-switch";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = "param-bool-" + key;
        checkbox.checked = !!GAME_PARAMS[key];

        const slider = document.createElement("span");
        slider.className = "param-toggle-slider";

        toggleWrap.appendChild(checkbox);
        toggleWrap.appendChild(slider);

        checkbox.addEventListener("change", function(){
          GAME_PARAMS[key] = checkbox.checked;
          // 音樂開關：即時暫停/恢復目前正在播放的背景音樂
          if(key === "musicEnabled"){
            if(!checkbox.checked){
              if(sounds.bgm && !sounds.bgm.paused) sounds.bgm.pause();
            } else if(game && game.musicStarted){
              sounds.bgm.muted = false;
              sounds.bgm.play().catch(() => {});
            }
          }
        });

        top.appendChild(labelEl);
        top.appendChild(toggleWrap);
        row.appendChild(top);
        return row;
      }

      if(type === "text"){
        // 文字型參數（目前用於音樂/音效檔案名稱）：只給一個文字輸入框，
        // 直接輸入 sounds/ 資料夾底下的檔名，例如 sounds/hit.wav
        labelEl.htmlFor = "param-text-" + key;

        const text = document.createElement("input");
        text.type = "text";
        text.id = "param-text-" + key;
        text.className = "param-text";
        text.value = GAME_PARAMS[key];
        text.spellcheck = false;
        text.placeholder = "例如 sounds/hit.wav";

        function updateText(v){
          const val = (v || "").trim();
          if(!val) return;
          GAME_PARAMS[key] = val;
          text.value = val;
          // 如果這個 key 是音效檔名，換檔後要重新載入該音效
          const sndKey = FILE_KEY_TO_SND_KEY[key];
          if(sndKey) reloadSound(sndKey);
        }
        text.addEventListener("change", function(){ updateText(text.value); text.blur(); });

        top.appendChild(labelEl);
        row.appendChild(top);
        row.appendChild(text);

        const hint = document.createElement("div");
        hint.className = "param-row-hint";
        hint.textContent = "檔案需放在 sounds/ 資料夾底下";
        row.appendChild(hint);

        return row;
      }

      const isSec = (type === "sec");
      const isFree = (type === "free"); // 不設上下限的參數
      const noLimit = isSec || isFree;
      labelEl.htmlFor = noLimit ? ("param-num-" + key) : ("param-range-" + key);
      if(isSec) labelEl.textContent = labelEl.textContent + "（秒）";
      function toDisplay(frames){ return isSec ? +(frames / FPS).toFixed(3) : frames; }
      function toStored(display){ return isSec ? Math.round(display * FPS) : display; }

      const num = document.createElement("input");
      num.type = "number";
      num.id = "param-num-" + key;
      if(noLimit){
        num.step = step;
      } else {
        num.min = min; num.max = max; num.step = step;
      }
      num.value = toDisplay(GAME_PARAMS[key]);
      num.className = "param-num";

      top.appendChild(labelEl);
      top.appendChild(num);

      let range = null;
      if(!noLimit){
        range = document.createElement("input");
        range.type = "range";
        range.id = "param-range-" + key;
        range.min = min; range.max = max; range.step = step;
        range.value = toDisplay(GAME_PARAMS[key]);
      }

      function updateValue(v){
        let val = parseFloat(v);
        if(isNaN(val)) return;
        if(!noLimit) val = Math.max(min, Math.min(max, val));
        GAME_PARAMS[key] = toStored(val);
        if(range) range.value = val;
        num.value = val;
        // 畫面寬高／地面高度比較特殊：改變後要重新調整 canvas 大小（或地板位置）
        // 並重置場上物件位置，不能只是單純更新數字
        if(key === "screenWidth" || key === "screenHeight" || key === "groundHeight") applyScreenSize();
      }

      if(range){
        range.addEventListener("input", function(){ updateValue(range.value); });
        range.addEventListener("change", function(){ range.blur(); });
        range.addEventListener("mouseup", function(){ range.blur(); });
        range.addEventListener("touchend", function(){ range.blur(); });
      }
      num.addEventListener("change", function(){ updateValue(num.value); num.blur(); });

      row.appendChild(top);
      if(range) row.appendChild(range);
      return row;
    }

    PARAM_CATEGORIES.forEach(function(cat){
      const details = document.createElement("details");
      details.className = "param-group";
      details.dataset.kind = cat.kind;
      details.open = true;

      const summary = document.createElement("summary");
      const titleSpan = document.createElement("span");
      titleSpan.textContent = cat.title;
      const countSpan = document.createElement("span");
      countSpan.className = "param-group-count";
      countSpan.textContent = cat.keys.length + " 項";
      summary.appendChild(titleSpan);
      summary.appendChild(countSpan);

      const body = document.createElement("div");
      body.className = "param-group-body";

      cat.keys.forEach(function(key){
        const meta = metaByKey[key];
        if(!meta) return;
        body.appendChild(buildRow(meta));
      });

      details.appendChild(summary);
      details.appendChild(body);
      container.appendChild(details);
    });

    const categorizedKeys = new Set(PARAM_CATEGORIES.reduce(function(acc,c){ return acc.concat(c.keys); }, []));
    const leftover = GAME_PARAMS_META.filter(function(meta){ return !categorizedKeys.has(meta[1]); });
    if(leftover.length){
      const details = document.createElement("details");
      details.className = "param-group";
      details.dataset.kind = "other";
      details.open = true;
      const summary = document.createElement("summary");
      const titleSpan = document.createElement("span");
      titleSpan.textContent = "⚙️ 其他";
      const countSpan = document.createElement("span");
      countSpan.className = "param-group-count";
      countSpan.textContent = leftover.length + " 項";
      summary.appendChild(titleSpan);
      summary.appendChild(countSpan);
      const body = document.createElement("div");
      body.className = "param-group-body";
      leftover.forEach(function(meta){ body.appendChild(buildRow(meta)); });
      details.appendChild(summary);
      details.appendChild(body);
      container.appendChild(details);
    }
  }

  function refreshParamPanelValues(){
    GAME_PARAMS_META.forEach(function(meta){
      const key = meta[1];
      const type = meta[5];
      if(type === "bool"){
        const checkbox = document.getElementById("param-bool-" + key);
        if(checkbox) checkbox.checked = !!GAME_PARAMS[key];
        return;
      }
      if(type === "text"){
        const text = document.getElementById("param-text-" + key);
        if(text) text.value = GAME_PARAMS[key];
        return;
      }
      const range = document.getElementById("param-range-" + key);
      const num = document.getElementById("param-num-" + key);
      const displayVal = (type === "sec") ? +(GAME_PARAMS[key] / FPS).toFixed(3) : GAME_PARAMS[key];
      if(range) range.value = displayVal;
      if(num) num.value = displayVal;
    });
  }

  function showStatus(msg, ms){
    const statusEl = document.getElementById("paramCopyStatus");
    if(!statusEl) return;
    statusEl.textContent = msg;
    setTimeout(function(){ statusEl.textContent = ""; }, ms || 2500);
  }

  const settingsBtn = document.getElementById("settingsBtn");
  const paramPanel = document.getElementById("paramPanel");
  const closeParamPanel = document.getElementById("closeParamPanel");
  const paramTextArea = document.getElementById("paramTextArea");
  const copyParamsBtn = document.getElementById("copyParamsBtn");
  const applyParamsBtn = document.getElementById("applyParamsBtn");
  const resetParamsBtn = document.getElementById("resetParamsBtn");
  const restartGameBtn = document.getElementById("restartGameBtn");

  if(settingsBtn && paramPanel){
    settingsBtn.addEventListener("click", function(){
      const willShow = paramPanel.style.display === "none";
      paramPanel.style.display = willShow ? "flex" : "none";
      DEBUG_SHOW_HITBOX = willShow;
      if(willShow) refreshParamPanelValues();

  }
  if(closeParamPanel && paramPanel){
    closeParamPanel.addEventListener("click", function(){
      paramPanel.style.display = "none";
      DEBUG_SHOW_HITBOX = false;
      closeParamPanel.blur();
    });
  }
  if(copyParamsBtn && paramTextArea){
    copyParamsBtn.addEventListener("click", function(){
      const json = JSON.stringify(GAME_PARAMS, null, 2);
      paramTextArea.value = json;
      let copied = false;
      try{
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(json);
          copied = true;
        }
      }catch(e){}
      if(!copied){
        try{ paramTextArea.select(); document.execCommand("copy"); copied = true; }catch(e){}
      }
      showStatus(copied ? "已複製到剪貼簿！可以貼到別的地方保存。" : "已顯示在下方文字框，請手動全選複製。");
      copyParamsBtn.blur();
      paramTextArea.blur();
    });
  }
  if(applyParamsBtn && paramTextArea){
    applyParamsBtn.addEventListener("click", function(){
      try{
        const parsed = JSON.parse(paramTextArea.value);
        let sizeChanged = false;
        let musicToggleChanged = false;
        Object.keys(parsed).forEach(function(key){
          if(!Object.prototype.hasOwnProperty.call(GAME_PARAMS, key)) return;
          const incoming = parsed[key];
          const current = GAME_PARAMS[key];
          if(typeof incoming === "boolean" && typeof current === "boolean"){
            if(key === "musicEnabled" && incoming !== current) musicToggleChanged = true;
            GAME_PARAMS[key] = incoming;
          }else if(typeof incoming === "number" && typeof current === "number"){
            if((key === "screenWidth" || key === "screenHeight" || key === "groundHeight") && incoming !== current) sizeChanged = true;
            GAME_PARAMS[key] = incoming;
          }else if(typeof incoming === "string" && typeof current === "string" && incoming.trim()){
            GAME_PARAMS[key] = incoming.trim();
            const sndKey = FILE_KEY_TO_SND_KEY[key];
            if(sndKey) reloadSound(sndKey);
          }
        });
        if(sizeChanged) applyScreenSize();
        if(musicToggleChanged){
          if(GAME_PARAMS.musicEnabled){
            if(game && game.musicStarted) sounds.bgm.play().catch(() => {});
          } else if(sounds.bgm && !sounds.bgm.paused){
            sounds.bgm.pause();
          }
        }
        refreshParamPanelValues();
        showStatus("參數已套用！");
      }catch(e){
        showStatus("格式錯誤，請確認貼上的是完整的參數 JSON。", 3000);
      }
      applyParamsBtn.blur();
      paramTextArea.blur();
    });
  }
  if(resetParamsBtn){
    resetParamsBtn.addEventListener("click", function(){
      GAME_PARAMS = JSON.parse(JSON.stringify(GAME_PARAMS_DEFAULTS));
      Object.keys(SND_FILE_KEY).forEach(reloadSound);

      } else if(sounds.bgm && !sounds.bgm.paused){
        sounds.bgm.pause();
      }
      showStatus("已還原成預設值。");
      resetParamsBtn.blur();

  if(restartGameBtn){
    restartGameBtn.addEventListener("click", function(){
      // 獨立按鈕，跟設定齒輪並排固定在畫面上，不管設定面板有沒有打開都能點來重開一局，

  }

  function copyTextFromTextarea(ta){

  if(roleHostBtn && roleGuestBtn && hostFlow && guestFlow){
