  }
  if(hostCreateBtn){
    hostCreateBtn.addEventListener("click", function(){
      hostOfferText.value = "";
      NetPlay.hostCreateOffer();
      hostCreateBtn.blur();
    });
  }
  if(hostCopyOfferBtn && hostOfferText){
    hostCopyOfferBtn.addEventListener("click", function(){
      const ok = copyTextFromTextarea(hostOfferText);
      showStatus(ok ? "已複製，傳給對方吧！" : "複製失敗，請手動全選複製。");
      hostCopyOfferBtn.blur();
    });
  }
  if(hostConnectBtn && hostAnswerText){
    hostConnectBtn.addEventListener("click", function(){
      NetPlay.hostConnectWithAnswer(hostAnswerText.value);
      hostConnectBtn.blur();
    });
  }
  if(guestCreateBtn && guestOfferText){
    guestCreateBtn.addEventListener("click", function(){
      guestAnswerText.value = "";
      NetPlay.guestCreateAnswer(guestOfferText.value);
      guestCreateBtn.blur();
    });
  }
  if(guestCopyAnswerBtn && guestAnswerText){
    guestCopyAnswerBtn.addEventListener("click", function(){
      const ok = copyTextFromTextarea(guestAnswerText);
      showStatus(ok ? "已複製，傳回給對方吧！" : "複製失敗，請手動全選複製。");
      guestCopyAnswerBtn.blur();
    });
  }
  if(onlineDisconnectBtn){
    onlineDisconnectBtn.addEventListener("click", function(){
      NetPlay.disconnect();
      if(game){
        game.reset();
        game.state = GameState.MENU;
      }
      onlineDisconnectBtn.blur();
    });
  }
})();

/* ============================================================
   虛擬搖桿與螢幕按鈕（手機/平板觸控用）
   ------------------------------------------------------------
   搖桿：對應 ArrowLeft / ArrowRight / ArrowUp（左右移動、跳躍）
   按鈕：對應 Enter / Space，觸發飛撲與殺球
   完全比照 skuld.html 的做法。
   ============================================================ */
(function(){
  function updateControlsVisibility(){
    const isLandscape = window.innerWidth > window.innerHeight;
    const isPortrait = window.innerWidth <= window.innerHeight;
    const isMobile = window.innerWidth <= 768;
    const joystick = document.getElementById("joystick");
    const screenButtons = document.getElementById("screenButtons");
    if(joystick && screenButtons){
      if(isLandscape && window.innerWidth <= 900){
        joystick.style.display = "block";
        screenButtons.style.display = "block";
      } else if(isPortrait && isMobile){
        joystick.style.display = "block";
        screenButtons.style.display = "block";
      } else {
        joystick.style.display = "none";
        screenButtons.style.display = "none";
      }
      screenButtons.style.zIndex = 2000;
    }
  }
  window.addEventListener("resize", updateControlsVisibility);
  window.addEventListener("orientationchange", updateControlsVisibility);
  updateControlsVisibility();
  window.addEventListener("resize", ()=>setTimeout(updateKnobGeometry, 50));
  window.addEventListener("orientationchange", ()=>setTimeout(updateKnobGeometry, 50));
  setTimeout(updateKnobGeometry, 50);

  // 虛擬搖桿控制
  const joystick = document.getElementById("joystick");
  const knob = document.getElementById("joystick-knob");
  const directionIndicators = document.querySelectorAll(".direction-indicator");
  let dragging = false, startX = 0, startY = 0;
  let joyDX = 0, joyDY = 0;
  let activeTouchId = null;
  let knobCenterOffset = 35; // 動態計算：底座與旋鈕置中所需的位移量
  let knobMaxDist = 45;      // 動態計算：旋鈕可拖曳的最大距離

  function updateKnobGeometry(){
    if(!joystick || !knob) return;
    const baseSize = joystick.offsetWidth;
    const knobSize = knob.offsetWidth;
    knobCenterOffset = (baseSize - knobSize) / 2;
    // 讓旋鈕邊緣最遠可以貼到底座邊緣，並保留一點緩衝
    knobMaxDist = Math.max(20, baseSize / 2 - knobSize / 4);
  }

  function updateDirectionIndicators(){
    directionIndicators.forEach(function(indicator){ indicator.classList.remove("active"); });
    if(Math.abs(joyDX) > 0.1 || Math.abs(joyDY) > 0.1){
      let direction = "";
      if(joyDY < -0.3) direction += "up";
      else if(joyDY > 0.3) direction += "down";
      if(joyDX < -0.3) direction += "-left";
      else if(joyDX > 0.3) direction += "-right";
      if(direction){
        const indicator = document.querySelector(".direction-indicator." + direction);
        if(indicator) indicator.classList.add("active");
      }
    }
  }

  function resetJoystick(){
    dragging = false;
    activeTouchId = null;
    if(knob){ knob.style.left = knobCenterOffset + "px"; knob.style.top = knobCenterOffset + "px"; }
    joyDX = 0; joyDY = 0;
    keys["ArrowLeft"] = keys["ArrowRight"] = keys["ArrowUp"] = keys["ArrowDown"] = false;
    directionIndicators.forEach(function(indicator){ indicator.classList.remove("active"); });
  }

  function moveKnobTo(clientX, clientY){
    let dx = clientX - startX;
    let dy = clientY - startY;
    const maxDist = knobMaxDist;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist > maxDist){
      dx = dx * maxDist / dist;
      dy = dy * maxDist / dist;
    }
    knob.style.left = (knobCenterOffset + dx) + "px";
    knob.style.top = (knobCenterOffset + dy) + "px";
    joyDX = dx / maxDist;
    joyDY = dy / maxDist;
    keys["ArrowLeft"]  = joyDX < -0.2;
    keys["ArrowRight"] = joyDX > 0.2;
    keys["ArrowUp"]    = joyDY < -0.2;
    keys["ArrowDown"]  = joyDY > 0.2;
    updateDirectionIndicators();
  }

  if(joystick && knob){
    // 綁在整個底座（外圈）上，而不是只綁在中間的小旋鈕上，
    // 這樣玩家點在搖桿範圍內任何地方都能立刻開始拖曳，大幅提升靈敏度
    joystick.addEventListener("touchstart", function(e){
      if(dragging) return;
      dragging = true;
      updateKnobGeometry();
      const touch = e.changedTouches[0];
      activeTouchId = touch.identifier;
      const baseRect = joystick.getBoundingClientRect();
      startX = baseRect.left + baseRect.width / 2;
      startY = baseRect.top + baseRect.height / 2;
      // 立刻把旋鈕移動到手指按下的位置，減少「按了沒反應」的感覺
      moveKnobTo(touch.clientX, touch.clientY);
      if(game.state === GameState.MENU || game.state === GameState.GAME_OVER){
        keys["Enter"] = true;
        setTimeout(()=>{ keys["Enter"] = false; }, 100);
      }
      e.preventDefault();
      e.stopPropagation();
    }, {passive:false});

    document.addEventListener("touchmove", function(e){
      if(!dragging) return;
      let touch = null;
      for(const t of e.touches){
        if(t.identifier === activeTouchId){ touch = t; break; }
      }
      if(!touch) return;
      moveKnobTo(touch.clientX, touch.clientY);
      e.preventDefault();
    }, {passive:false});

    document.addEventListener("touchend", function(e){
      if(!dragging) return;
      let stillTouching = false;
      for(const t of e.touches){
        if(t.identifier === activeTouchId){ stillTouching = true; break; }
      }
      if(stillTouching) return;
      resetJoystick();
    }, {passive:false});

    // 補上 touchcancel：觸控常會被系統手勢、多指觸控等中斷而不會觸發 touchend，
    // 若沒處理這個事件，dragging 會卡在 true，導致搖桿之後完全沒反應
    document.addEventListener("touchcancel", function(e){
      if(!dragging) return;
      let stillTouching = false;
      for(const t of e.touches){
        if(t.identifier === activeTouchId){ stillTouching = true; break; }
      }
      if(stillTouching) return;
      resetJoystick();
    }, {passive:false});
  }

  // 虛擬按鈕控制（飛撲/殺球，對應 Enter / Space）
  const actionBtn = document.getElementById("actionBtn");
  if(actionBtn){
    function pressAction(e){
      keys["Enter"] = true;
      if(e){ e.preventDefault(); e.stopPropagation(); }
    }
    function releaseAction(e){
      keys["Enter"] = false;
      if(e){ e.preventDefault(); }
    }
    actionBtn.addEventListener("touchstart", pressAction, {passive:false});
    actionBtn.addEventListener("touchend", releaseAction, {passive:false});
    actionBtn.addEventListener("touchcancel", releaseAction, {passive:false});
    actionBtn.addEventListener("mousedown", pressAction);
    actionBtn.addEventListener("mouseup", releaseAction);
    actionBtn.addEventListener("mouseleave", releaseAction);
  }
})();

/* ============================================================
   主迴圈（固定時間步 Fixed Timestep，確保不同裝置/螢幕更新率速度一致）
   ============================================================ */
const FRAME_TIME = 1000 / FPS; // 每次遊戲邏輯更新間隔（毫秒），固定為 1/60 秒
const MAX_UPDATES_PER_FRAME = 5; // 避免分頁切換回來後瞬間補跑太多次造成暴衝

let lastTime = null;
let accumulator = 0;

/* ------------------------------------------------------------
   分頁/視窗切到背景（電腦縮小視窗、切換分頁；手機切到別的 App、
   鎖螢幕）時，明確把音樂與遊戲邏輯「暫停」，而不是放給瀏覽器自己
   節流 requestAnimationFrame（不同瀏覽器/裝置節流的方式不一致，
   這正是電腦版跟手機版體感速度不一樣的主因）。
   回到前景時再明確「恢復」，並重置計時器，避免補跑一堆幀造成暴衝。
   ------------------------------------------------------------ */
let wasMusicPlayingBeforeHide = false;
let isHiddenNow = false; // 避免 blur 跟 visibilitychange 幾乎同時觸發，導致暫停旗標被第二次呼叫覆蓋掉

function pauseForHidden(){
  if (isHiddenNow) return; // 已經處理過這次「切到背景」了，不要重複記錄
  isHiddenNow = true;
  // 暫停音樂
  if (sounds.bgm && !sounds.bgm.paused) {
    wasMusicPlayingBeforeHide = true;
    sounds.bgm.pause();
  } else {
    wasMusicPlayingBeforeHide = false;
  }
}

function resumeFromHidden(){
  if (!isHiddenNow) return; // 沒有處於「背景」狀態就不用恢復（避免 focus/visibilitychange 重複觸發）
  isHiddenNow = false;
  // 回到前景才恢復音樂，避免在背景繼續播放
  if (wasMusicPlayingBeforeHide && sounds.bgm) {
    sounds.bgm.play().catch(() => {});
  }
  // 重置計時器：不要把背景期間累積的時間一次補跑完，
  // 這樣電腦跟手機從背景切回來的體感速度才會一致
  lastTime = null;
  accumulator = 0;
}

document.addEventListener("visibilitychange", function(){
  if (document.hidden) {
    pauseForHidden();
  } else {
    resumeFromHidden();
  }
});
// 部分瀏覽器（尤其某些行動裝置瀏覽器）縮小/切走時觸發 blur/focus 而非 visibilitychange，
// 一併處理以確保電腦版與手機版行為一致
window.addEventListener("blur", pauseForHidden);
window.addEventListener("focus", function(){
  if (!document.hidden) resumeFromHidden();
});

function loop(currentTime) {
  // 頁面在背景時完全不跑遊戲邏輯與畫面更新，等回到前景由 resumeFromHidden() 重置計時器後再繼續
  if (document.hidden) {
    requestAnimationFrame(loop);
    return;
  }

  if (lastTime === null) {
    lastTime = currentTime;
  }
  let delta = currentTime - lastTime;
  lastTime = currentTime;

  if (delta > 250) delta = 250;

  accumulator += delta * (GAME_PARAMS.gameSpeedMultiplier || 1);

  let updates = 0;
  while (accumulator >= FRAME_TIME && updates < MAX_UPDATES_PER_FRAME) {
    game.update();
    accumulator -= FRAME_TIME;
    updates++;
  }

  game.draw();
  requestAnimationFrame(loop);
}

checkAssetsReady();
requestAnimationFrame(loop);

})();
</script>
