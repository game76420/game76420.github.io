<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Hexxagon Classic - Strategy Battle</title>
    <style>
        body { 
            background: #000 url('https://www.transparenttextures.com/patterns/stardust.png'); 
            color: white; display: flex; flex-direction: column; align-items: center; 
            font-family: 'Segoe UI', Arial, sans-serif; margin: 0; overflow: hidden; 
        }
        .header { margin-top: 20px; text-align: center; }
        .score-board { 
            display: flex; gap: 40px; font-size: 32px; font-weight: bold;
            background: rgba(75, 0, 130, 0.4); padding: 10px 50px; border-radius: 15px;
            border: 2px solid #5a189a; margin-top: 10px;
        }
        canvas {
            cursor: pointer; filter: drop-shadow(0 0 15px #5a189a); margin-top: 10px; background: transparent;
            width: min(900px, calc(100vw - 20px)); height: auto; max-height: 72vh; touch-action: none;
        }
        .status { font-size: 28px; color: #f1c40f; text-shadow: 0 0 10px #f1c40f; height: 40px; }
        .controls {
            position: fixed; left: 0; right: 0; bottom: 18px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; z-index: 8;
        }
        .btn { 
            background: #fdfdfd; color: #111; padding: 10px 25px; border-radius: 6px; 
            font-weight: bold; font-size: 20px; cursor: pointer; border: 3px solid #666; user-select: none; pointer-events: auto;
        }
        .btn:hover { background: #fff; transform: translateY(-2px); }
        .btn.disabled { opacity: 0.3; pointer-events: none; }
        .setup-modal {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.72);
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .setup-modal.hidden { display: none; }
        .setup-card {
            width: 420px; background: rgba(23, 10, 45, 0.96); border: 2px solid #7b2cbf; border-radius: 14px;
            padding: 24px; box-shadow: 0 0 30px rgba(123, 44, 191, 0.45);
        }
        .setup-title { font-size: 30px; font-weight: 700; margin: 0 0 16px 0; text-align: center; color: #f1c40f; }
        .setup-row { margin-bottom: 14px; display: flex; flex-direction: column; gap: 8px; }
        .setup-label { font-size: 16px; color: #ddd; }
        .setup-select {
            background: #120621; color: #fff; border: 2px solid #5a189a; border-radius: 8px;
            font-size: 17px; padding: 10px 12px; outline: none;
        }
        .setup-actions { display: flex; justify-content: center; margin-top: 20px; }
        @media (max-width: 900px) {
            body { overflow: auto; }
            .header { margin-top: 10px; width: 100%; }
            canvas { width: 95vw; }
            .status { font-size: 22px; height: 30px; }
            .score-board { font-size: 24px; gap: 28px; padding: 8px 28px; }
            .controls { bottom: 10px; padding: 0 10px; }
            .btn { font-size: 16px; padding: 8px 14px; border-width: 2px; }
            .setup-card { width: min(92vw, 420px); padding: 16px; }
            .setup-title { font-size: 24px; margin-bottom: 12px; }
            .setup-select { font-size: 16px; padding: 9px 10px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="status" id="status">PLAYER TURN</div>
        <div class="score-board">
            <div style="color: #ff3333;"><span id="score1">3</span></div>
            <div style="color: #33ffff;"><span id="score2">3</span></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="900" height="700"></canvas>
    
    <div class="controls">
        <div class="btn" id="reset-btn">RESET</div>
        <div class="btn" id="undo-btn">UNDO</div>
    </div>

    <div class="setup-modal" id="setup-modal">
        <div class="setup-card">
            <h2 class="setup-title">GAME SETUP</h2>
            <div class="setup-row">
                <label class="setup-label" for="mode-select">Mode</label>
                <select class="setup-select" id="mode-select">
                    <option value="pve">Player vs AI</option>
                    <option value="pvp">Player vs Player</option>
                    <option value="aivai">AI vs AI</option>
                </select>
            </div>
            <div class="setup-row" id="team-row">
                <label class="setup-label" for="team-select">Player Side</label>
                <select class="setup-select" id="team-select">
                    <option value="1">Red</option>
                    <option value="2">Blue</option>
                </select>
            </div>
            <div class="setup-actions">
                <div class="btn" id="start-btn">START</div>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const statusDiv = document.getElementById('status');
const score1Div = document.getElementById('score1');
const score2Div = document.getElementById('score2');
const undoBtn = document.getElementById('undo-btn');
const resetBtn = document.getElementById('reset-btn');
const setupModal = document.getElementById('setup-modal');
const modeSelect = document.getElementById('mode-select');
const teamSelect = document.getElementById('team-select');
const teamRow = document.getElementById('team-row');
const startBtn = document.getElementById('start-btn');

let R = 38;
let OFFSET_X = 450, OFFSET_Y = 350;
let board = {}, selected = null, turn = 1, history = [];
const holes = ["0,-1", "-1,1", "1,0"];
let animation = null;
let animationFrameId = null;
let aiTimer = null;
let gameMode = "pve";
let humanSide = 1;

// Shallow clone board for undo snapshots
function deepClone(b) {
    const n = {};
    for (let k in b) n[k] = b[k];
    return n;
}

function initBoard() {
    clearScheduledAi();
    updateBoardLayout();
    board = {};
    for (let q = -4; q <= 4; q++) {
        for (let r = Math.max(-4, -q-4); r <= Math.min(4, -q+4); r++) {
            let key = `${q},${r}`;
            board[key] = holes.includes(key) ? -1 : 0;
        }
    }
    // Initial piece placement
    board['0,-4']=2; board['4,-4']=1; board['4,0']=2; board['0,4']=1; board['-4,4']=2; board['-4,0']=1;
    turn = 1; history = []; selected = null;
    updateStatus();
    updateUndoButton();
    render();
    runAutoTurnIfNeeded();
}

function updateBoardLayout() {
    const isMobile = window.innerWidth <= 900;
    canvas.width = 900;
    canvas.height = isMobile ? 980 : 700;
    const maxRByWidth = (canvas.width * 0.95) / 13.88;
    const maxRByHeight = (canvas.height * 0.9) / 15.736;
    const fitR = Math.floor(Math.min(maxRByWidth, maxRByHeight));
    R = isMobile ? Math.max(42, fitR) : 38;
    OFFSET_X = canvas.width / 2;
    OFFSET_Y = canvas.height / 2;
}

function showSetupMenu() {
    clearScheduledAi();
    if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
    }
    animation = null;
    selected = null;
    setupModal.classList.remove('hidden');
    render();
}

function updateUndoButton() {
    const canUndo = history.length > 0 && turn !== 0 && isHumanTurn() && !animation;
    undoBtn.classList.toggle('disabled', !canUndo);
}

undoBtn.onclick = () => {
    if (history.length > 0 && turn !== 0 && isHumanTurn() && !animation) {
        const prev = history.pop();
        board = prev.board;
        turn = prev.turn;
        selected = null;
        updateStatus();
        updateUndoButton();
        render();
    }
};

// --- Coordinate and click logic ---
function getDist(q1, r1, q2, r2) {
    return (Math.abs(q1 - q2) + Math.abs(q1 + r1 - q2 - r2) + Math.abs(r1 - r2)) / 2;
}

function hexToPixel(q, r) {
    return { x: R * 1.5 * q + OFFSET_X, y: R * Math.sqrt(3) * (r + q/2) + OFFSET_Y };
}

function pixelToHex(x, y) {
    let q = (2/3 * (x - OFFSET_X)) / R;
    let r = (-1/3 * (x - OFFSET_X) + Math.sqrt(3)/3 * (y - OFFSET_Y)) / R;
    let s = -q-r;
    let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
    if (Math.abs(rq - q) > Math.max(Math.abs(rr - r), Math.abs(rs - s))) rq = -rr-rs;
    else if (Math.abs(rr - r) > Math.abs(rs - s)) rr = -rq-rs;
    return { q: rq, r: rr };
}

function isPointInHex(px, py, cx, cy) {
    const dx = Math.abs(px - cx);
    const dy = Math.abs(py - cy);
    const hexR = R * 0.94;
    return dy <= Math.sqrt(3) * hexR / 2 && Math.sqrt(3) * dx + dy <= Math.sqrt(3) * hexR;
}

function getHexAtPixel(x, y) {
    for (const key in board) {
        const [q, r] = key.split(',').map(Number);
        const pos = hexToPixel(q, r);
        if (isPointInHex(x, y, pos.x, pos.y)) return { q, r };
    }
    return null;
}

function getMoveOutcome(b, fK, tK, p) {
    const nextBoard = applyMove(b, fK, tK, p);
    const [tq, tr] = tK.split(',').map(Number);
    const [fq, fr] = fK.split(',').map(Number);
    const isJump = getDist(fq, fr, tq, tr) === 2;
    const converted = [];
    const convertedFrom = {};
    const dirs = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];
    for (const [dq, dr] of dirs) {
        const nK = `${tq + dq},${tr + dr}`;
        if (b[nK] > 0 && b[nK] !== p && nextBoard[nK] === p) {
            converted.push(nK);
            convertedFrom[nK] = b[nK];
        }
    }
    return { nextBoard, converted, convertedFrom, isJump };
}

function isHumanSide(side) {
    if (gameMode === "pvp") return true;
    if (gameMode === "aivai") return false;
    return side === humanSide;
}

function isHumanTurn() {
    return isHumanSide(turn);
}

function updateStatus() {
    if (turn === 0) return;
    if (isHumanTurn()) statusDiv.innerText = turn === 1 ? "RED PLAYER TURN" : "BLUE PLAYER TURN";
    else statusDiv.innerText = turn === 1 ? "RED AI THINKING..." : "BLUE AI THINKING...";
}

function clearScheduledAi() {
    if (aiTimer) {
        clearTimeout(aiTimer);
        aiTimer = null;
    }
}

function runAutoTurnIfNeeded() {
    clearScheduledAi();
    if (turn === 0 || animation || isHumanTurn()) return;
    updateStatus();
    aiTimer = setTimeout(() => aiTurn(turn), 220);
}

function startMoveAnimation({ fK, tK, p, isJump, converted, convertedFrom, onComplete }) {
    const from = fK.split(',').map(Number);
    const to = tK.split(',').map(Number);
    const fromPos = hexToPixel(from[0], from[1]);
    const toPos = hexToPixel(to[0], to[1]);
    animation = {
        start: performance.now(),
        duration: 360,
        fK,
        tK,
        p,
        isJump,
        converted,
        convertedFrom,
        fromPos,
        toPos,
        onComplete
    };
    tickAnimation();
}

function tickAnimation() {
    if (!animation) return;
    render();
    const elapsed = performance.now() - animation.start;
    if (elapsed < animation.duration) {
        animationFrameId = requestAnimationFrame(tickAnimation);
        return;
    }
    const done = animation;
    animation = null;
    if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
    }
    render();
    if (done.onComplete) done.onComplete();
}

// --- Rules and AI ---
function applyMove(b, fK, tK, p) {
    let nb = deepClone(b);
    let f = fK.split(',').map(Number), t = tK.split(',').map(Number);
    if (getDist(f[0], f[1], t[0], t[1]) === 2) nb[fK] = 0;
    nb[tK] = p;
    const dirs = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];
    for (let d of dirs) {
        let nK = `${t[0]+d[0]},${t[1]+d[1]}`;
        if (nb[nK] > 0 && nb[nK] !== p) nb[nK] = p;
    }
    return nb;
}

function getAllMoves(b, p) {
    let moves = [];
    let keys = Object.keys(b), myP = [], empty = [];
    for (let k of keys) {
        if (b[k] === p) myP.push(k);
        else if (b[k] === 0) empty.push(k);
    }
    for (let fK of myP) {
        let [fq, fr] = fK.split(',').map(Number);
        for (let tK of empty) {
            let [tq, tr] = tK.split(',').map(Number);
            if (getDist(fq, fr, tq, tr) <= 2) moves.push({f: fK, t: tK});
        }
    }
    return moves;
}

function evaluate(b) {
    let s1 = 0, s2 = 0;
    for (let k in b) { if (b[k] === 1) s1++; else if (b[k] === 2) s2++; }
    return s2 - s1;
}

function evaluateForPlayer(b, p) {
    const score = evaluate(b);
    return p === 2 ? score : -score;
}

function alphabetaForPlayer(b, depth, alpha, beta, currentPlayer, aiPlayer) {
    if (depth === 0) return evaluateForPlayer(b, aiPlayer);
    let moves = getAllMoves(b, currentPlayer);
    if (moves.length === 0) return evaluateForPlayer(b, aiPlayer);
    if (currentPlayer === aiPlayer) {
        let v = -Infinity;
        for (let m of moves) {
            v = Math.max(v, alphabetaForPlayer(applyMove(b, m.f, m.t, currentPlayer), depth - 1, alpha, beta, 3 - currentPlayer, aiPlayer));
            alpha = Math.max(alpha, v); if (beta <= alpha) break;
        }
        return v;
    } else {
        let v = Infinity;
        for (let m of moves) {
            v = Math.min(v, alphabetaForPlayer(applyMove(b, m.f, m.t, currentPlayer), depth - 1, alpha, beta, 3 - currentPlayer, aiPlayer));
            beta = Math.min(beta, v); if (beta <= alpha) break;
        }
        return v;
    }
}

function aiTurn(side) {
    if (turn !== side || turn === 0 || animation) return;
    let moves = getAllMoves(board, side);
    if (moves.length === 0) { checkEnd(); return; }
    let bestMoves = [], maxV = -Infinity;
    for (let m of moves) {
        let v = alphabetaForPlayer(applyMove(board, m.f, m.t, side), 2, -Infinity, Infinity, 3 - side, side);
        if (v > maxV) { maxV = v; bestMoves = [m]; }
        else if (v === maxV) { bestMoves.push(m); }
    }
    let c = bestMoves[Math.floor(Math.random() * bestMoves.length)];
    const outcome = getMoveOutcome(board, c.f, c.t, side);
    board = outcome.nextBoard;
    startMoveAnimation({
        fK: c.f,
        tK: c.t,
        p: side,
        isJump: outcome.isJump,
        converted: outcome.converted,
        convertedFrom: outcome.convertedFrom,
        onComplete: () => {
            turn = 3 - side;
            selected = null;
            updateStatus();
            updateUndoButton();
            render();
            checkEnd();
            runAutoTurnIfNeeded();
        }
    });
}

function checkEnd() {
    let p1m = getAllMoves(board, 1), p2m = getAllMoves(board, 2);
    if (p1m.length === 0 || p2m.length === 0) {
        let winner = p1m.length === 0 ? 2 : 1;
        for (let k in board) if (board[k] === 0) board[k] = winner;
        render();
        let s1 = 0, s2 = 0;
        for (let k in board) { if(board[k]===1) s1++; if(board[k]===2) s2++; }
        statusDiv.innerText = s1 > s2 ? "RED WINS!" : "BLUE WINS!";
        turn = 0;
        clearScheduledAi();
        updateUndoButton();
    }
}

// --- Rendering ---
function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let c1 = 0, c2 = 0;
    const animProgress = animation ? Math.min(1, (performance.now() - animation.start) / animation.duration) : 1;
    const animTarget = animation ? animation.tK : null;
    for (let k in board) {
        let [q, r] = k.split(',').map(Number);
        let { x, y } = hexToPixel(q, r);
        let val = board[k];
        let isSel = selected && selected.q === q && selected.r === r;

        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            let a = Math.PI / 3 * i;
            ctx.lineTo(x + R * 0.94 * Math.cos(a), y + R * 0.94 * Math.sin(a));
        }
        ctx.closePath();
        if (val === -1) ctx.fillStyle = "#000";
        else ctx.fillStyle = isSel ? "#9b59b6" : "#4b0082";
        ctx.fill();
        ctx.strokeStyle = "#1a0430"; ctx.lineWidth = 2; ctx.stroke();
        if (isSel) { ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 4; ctx.stroke(); }

        if (selected && val === 0 && getDist(selected.q, selected.r, q, r) <= 2) {
            ctx.fillStyle = "rgba(46, 204, 113, 0.4)"; ctx.fill();
        }

        if (val > 0) {
            if(val === 1) c1++; else c2++;
            const hideTargetPiece = animation && animTarget === k && animProgress < 0.85;
            if (!hideTargetPiece) {
                let drawVal = val;
                if (animation && animation.convertedFrom && animation.convertedFrom[k] && animProgress < 0.7) {
                    drawVal = animation.convertedFrom[k];
                }
                ctx.beginPath(); ctx.arc(x, y, R * 0.65, 0, Math.PI * 2);
                ctx.fillStyle = drawVal === 1 ? "#ff3333" : "#33ccff";
                ctx.fill(); ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
            }
        }
    }

    if (animation) {
        const t = animProgress;
        const pieceColor = animation.p === 1 ? "#ff3333" : "#33ccff";
        const mx = animation.fromPos.x + (animation.toPos.x - animation.fromPos.x) * t;
        const my = animation.fromPos.y + (animation.toPos.y - animation.fromPos.y) * t - Math.sin(t * Math.PI) * (animation.isJump ? 22 : 10);

        // Move piece animation (copy/jump both use traveling orb)
        ctx.beginPath();
        ctx.arc(mx, my, R * 0.48, 0, Math.PI * 2);
        ctx.fillStyle = pieceColor;
        ctx.globalAlpha = 0.9;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Infection pulse on converted neighbors
        if (animation.converted.length > 0) {
            for (const key of animation.converted) {
                const [cq, cr] = key.split(',').map(Number);
                const pos = hexToPixel(cq, cr);
                if (t >= 0.7) {
                    const infectT = (t - 0.7) / 0.3;
                    const pulse = 1 + 0.35 * Math.sin(infectT * Math.PI * 3);
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, R * 0.72 * pulse, 0, Math.PI * 2);
                    ctx.strokeStyle = pieceColor;
                    ctx.globalAlpha = 0.4 * (1 - infectT * 0.15);
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }
        }

        // Destination flash: brighter for copy, stronger for jump
        ctx.beginPath();
        ctx.arc(animation.toPos.x, animation.toPos.y, R * (animation.isJump ? 0.95 : 0.8), 0, Math.PI * 2);
        ctx.fillStyle = animation.p === 1 ? "rgba(255, 80, 80, 0.2)" : "rgba(80, 220, 255, 0.2)";
        ctx.fill();
    }
    score1Div.innerText = c1; score2Div.innerText = c2;
}

canvas.onpointerdown = (e) => {
    if (e.pointerType === "touch") e.preventDefault();
    if (turn === 0 || animation || !isHumanTurn()) return;
    let rect = canvas.getBoundingClientRect();
    const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);
    const clickedHex = getHexAtPixel(clickX, clickY);
    if (!clickedHex) {
        selected = null;
        render();
        return;
    }
    let { q, r } = clickedHex;
    let key = `${q},${r}`;

    if (board[key] === turn) {
        selected = { q, r };
    } else if (selected && board[key] === 0 && getDist(selected.q, selected.r, q, r) <= 2) {
        history.push({ board: deepClone(board), turn });
        const fromKey = `${selected.q},${selected.r}`;
        const currentSide = turn;
        const outcome = getMoveOutcome(board, fromKey, key, currentSide);
        board = outcome.nextBoard;
        selected = null;
        turn = 3 - currentSide;
        updateStatus();
        updateUndoButton();
        startMoveAnimation({
            fK: fromKey,
            tK: key,
            p: currentSide,
            isJump: outcome.isJump,
            converted: outcome.converted,
            convertedFrom: outcome.convertedFrom,
            onComplete: () => {
                render();
                checkEnd();
                runAutoTurnIfNeeded();
            }
        });
        return;
    } else { selected = null; }
    render();
};

resetBtn.onclick = () => {
    showSetupMenu();
};

modeSelect.onchange = () => {
    teamRow.style.display = modeSelect.value === "pve" ? "flex" : "none";
};

startBtn.onclick = () => {
    gameMode = modeSelect.value;
    humanSide = Number(teamSelect.value);
    setupModal.classList.add('hidden');
    initBoard();
};

modeSelect.onchange();
updateBoardLayout();
window.addEventListener('resize', () => {
    updateBoardLayout();
    render();
});
</script>
</body>
</html>
